<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management v3 - Node Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-text { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .input-dark {
            background: rgba(15, 23, 42, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        .quick-select {
            background: transparent !important;
            border: none !important;
            cursor: pointer;
            font-weight: 800;
            outline: none;
        }
    </style>
</head>
<body class="p-4 lg:p-8 min-h-screen">

<div class="max-w-[1200px] mx-auto w-full" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-900/40 p-6 rounded-2xl border border-white/5 shadow-2xl glass">
        <div class="text-center md:text-left">
            <h2 class="text-xl font-black neon-text uppercase tracking-[0.2em] italic">STAFF <span class="text-white">NODE</span></h2>
            <p class="text-[9px] text-blue-400 font-mono mt-1 uppercase tracking-widest italic">> STATUS: <span x-text="staffs.length"></span> NODES_ACTIVE</p>
        </div>
        
        <div class="flex flex-wrap justify-center gap-3">
            <div class="flex items-center gap-2 bg-slate-950/50 px-4 py-2 rounded-xl border border-white/5">
                <span class="text-[8px] text-slate-500 font-black uppercase tracking-widest">Limit:</span>
                <select x-model="rowsPerPage" @change="currentPage = 1" class="bg-transparent text-[10px] text-blue-400 font-black outline-none cursor-pointer">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                </select>
            </div>

            <button @click="getStaff()" class="p-3 bg-slate-900 hover:bg-slate-800 rounded-xl border border-white/5 transition-all active:scale-95 shadow-xl" :disabled="loading">
                <svg :class="loading ? 'animate-spin' : ''" class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            
            <button @click="openModal('add')" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl transition-all shadow-lg shadow-blue-600/20 text-[10px] tracking-widest uppercase">
                + Mint Staff
            </button>
        </div>
    </div>

    <div class="glass rounded-2xl shadow-2xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/80 text-slate-500 text-[8px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                        <th class="px-6 py-5 w-[35%]">Personnel Identity</th>
                        <th class="px-6 py-5 w-[25%]">Node / Outlet</th>
                        <th class="px-6 py-5 w-[20%] text-center">Status & Shiff</th>
                        <th class="px-6 py-5 w-[20%] text-right">Settings</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-blue-600/[0.03] transition-all group border-l-2 border-l-transparent hover:border-l-blue-500">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-xl bg-slate-900 border border-white/10 flex items-center justify-center flex-shrink-0 group-hover:border-blue-500/50 transition-all">
                                        <span class="text-[10px] font-black text-blue-400" x-text="(item.nama || item.Nama || '??').substring(0,2).toUpperCase()"></span>
                                    </div>
                                    <div class="min-w-0">
                                        <div class="font-bold text-slate-100 text-sm tracking-tight group-hover:text-blue-200 transition-colors" x-text="item.nama || item.Nama"></div>
                                        <div class="text-[9px] text-blue-400 font-black uppercase tracking-widest" x-text="item.posisi || item.Posisi"></div>
                                    </div>
                                </div>
                            </td>
                            
                            <td class="px-6 py-4">
                                <div class="inline-block px-2 py-1 rounded bg-slate-950/40 border border-white/5">
                                    <span class="text-[9px] text-slate-400 font-mono uppercase tracking-tighter" x-text="item.outlet || item.Outlet"></span>
                                </div>
                            </td>

                            <td class="px-6 py-4 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <select @change="quickUpdate(item, 'status', $event.target.value)"
                                            :class="(item.status || item.Status) === 'Aktif' ? 'text-emerald-400' : 'text-red-400'"
                                            class="quick-select text-[8px] uppercase tracking-widest text-center">
                                        <option value="Aktif" :selected="(item.status || item.Status) === 'Aktif'">● Online</option>
                                        <option value="non aktif" :selected="(item.status || item.Status) === 'non aktif'">○ Offline</option>
                                    </select>
                                    <span class="text-[9px] text-slate-500 font-mono uppercase font-black tracking-tighter" x-text="item.job || item.Job"></span>
                                </div>
                            </td>

                            <td class="px-6 py-4 text-right">
                                <div class="relative inline-block text-left" x-data="{ menuOpen: false }" @click.away="menuOpen = false">
                                    <button @click="menuOpen = !menuOpen" class="p-2 hover:bg-white/5 rounded-lg text-slate-600 hover:text-white transition-all">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                                    </button>
                                    <div x-show="menuOpen" x-cloak 
                                         x-transition:enter="transition ease-out duration-100"
                                         x-transition:enter-start="transform opacity-0 scale-95"
                                         class="absolute right-0 mt-2 w-32 glass border border-white/10 rounded-xl shadow-2xl z-50 overflow-hidden">
                                        <button @click="openModal('edit', item); menuOpen = false" class="w-full text-left px-4 py-3 text-[9px] font-black text-blue-400 hover:bg-blue-500/10 border-b border-white/5 uppercase">Edit Node</button>
                                        <button @click="deleteStaff(item.id || item.Id); menuOpen = false" class="w-full text-left px-4 py-3 text-[9px] font-black text-red-400 hover:bg-red-500/10 uppercase tracking-widest">Delete</button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="px-6 py-4 border-t border-white/5 bg-slate-900/60 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-[9px] font-mono text-slate-500 uppercase tracking-[0.2em] font-black">
                Registry Index: <span class="text-blue-400" x-text="startRange"></span>-<span class="text-blue-400" x-text="endRange"></span> 
            </div>

            <div class="flex items-center gap-1">
                <button @click="currentPage = 1" :disabled="currentPage === 1" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-white disabled:opacity-0 transition-all">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"></path></svg>
                </button>
                
                <button @click="currentPage--" :disabled="currentPage === 1" class="px-4 py-1.5 bg-white/5 rounded-lg border border-white/5 disabled:opacity-5 text-[10px] font-black uppercase">Prev</button>

                <div class="px-4 font-mono text-[10px] font-black text-blue-400">
                    <span x-text="currentPage"></span> / <span class="text-slate-600" x-text="totalPages"></span>
                </div>

                <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-4 py-1.5 bg-white/5 rounded-lg border border-white/5 disabled:opacity-5 text-[10px] font-black uppercase">Next</button>

                <button @click="currentPage = totalPages" :disabled="currentPage === totalPages" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-white disabled:opacity-0 transition-all">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"></path></svg>
                </button>
            </div>
        </div>
    </div>
    
    <div x-show="showModal" x-cloak 
         class="fixed inset-0 z-[100] flex items-start justify-center pt-16 md:pt-24 p-4 bg-slate-950/90 backdrop-blur-md overflow-y-auto" 
         x-transition:enter="duration-300 ease-out" x-transition:enter-start="opacity-0 -translate-y-8">
        
        <div @click.away="showModal = false" class="glass w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-white/10 mb-10">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]" x-text="mode === 'edit' ? 'Modify Personnel' : 'Mint Personnel'"></h3>
                <button @click="showModal = false" class="text-slate-500 hover:text-white text-xl transition-colors">&times;</button>
            </div>

            <form @submit.prevent="saveStaff" class="p-6 space-y-4">
                <div>
                    <label class="text-[8px] uppercase font-black text-slate-500 mb-1.5 block tracking-widest">Personnel Full Name</label>
                    <input type="text" x-model="form.nama" required class="w-full input-dark rounded-xl px-4 py-3 text-xs font-bold">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 mb-1.5 block tracking-widest">Position</label>
                        <select x-model="form.posisi" class="w-full input-dark rounded-xl px-3 py-2.5 text-[10px] font-black uppercase">
                            <option value="Teknisi">Teknisi</option>
                            <option value="Admin">Admin</option>
                            <option value="Frontliner">Cs</option>
                            <option value="Kepala Cabang">Kacab</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 mb-1.5 block tracking-widest">Initial Status</label>
                        <select x-model="form.status" class="w-full input-dark rounded-xl px-3 py-2.5 text-[10px] font-black uppercase">
                            <option value="Aktif">Aktif</option>
                            <option value="non aktif">Non Aktif</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[8px] uppercase font-black text-slate-500 mb-1.5 block tracking-widest">Node Outlet</label>
                    <input type="text" x-model="form.outlet" required class="w-full input-dark rounded-xl px-4 py-3 text-xs font-bold">
                </div>

                <div>
                    <label class="text-[8px] uppercase font-black text-slate-500 mb-1.5 block tracking-widest">Specialization</label>
                    <select x-model="form.job" class="w-full input-dark rounded-xl px-3 py-2.5 text-[10px] font-black uppercase">
                        <option value="Mesin">Mesin</option>
                        <option value="Interface">Interface</option>
                        <option value="Software">Software</option>
                        <option value="Aksesoris">Aksesori</option>
                        <option value="General">General</option>
                    </select>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" @click="showModal = false" class="flex-1 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-white transition-all">Abort</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-[10px] font-black text-white uppercase tracking-widest shadow-xl shadow-blue-600/30 transition-all active:scale-95" :disabled="loading">
                        <span x-text="loading ? 'Syncing...' : 'Commit Data'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
            form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' },

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; },
            get startRange() { return this.staffs.length === 0 ? 0 : (this.currentPage - 1) * this.rowsPerPage + 1; },
            get endRange() { return Math.min(this.currentPage * this.rowsPerPage, this.staffs.length); },

            async call(payload) {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    alert('Network Error: ' + err.message); return null;
                } finally { this.loading = false; }
            },

            async getStaff() {
                const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                if (res && res.data) {
                    this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    this.currentPage = 1;
                }
            },

            // Quick Update Function for Status in Table
            async quickUpdate(item, field, value) {
                const id = item.id || item.Id;
                const updatedData = { ...item, [field]: value, id: id };
                const res = await this.call({ method: 'path', table: 'staff', params: [updatedData] });
                if (res) {
                    const idx = this.staffs.findIndex(s => (s.id || s.Id) == id);
                    if (idx !== -1) this.staffs[idx][field] = value;
                }
            },

            openModal(mode, item = null) {
                this.mode = mode; this.showModal = true;
                if (mode === 'edit' && item) {
                    this.form = {
                        Id: item.id || item.Id, nama: item.nama || item.Nama,
                        outlet: item.outlet || item.Outlet, posisi: item.posisi || item.Posisi,
                        status: item.status || item.Status, job: item.job || item.Job
                    };
                } else {
                    this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' };
                }
            },

            async saveStaff() {
                const payload = { ...this.form, id: this.form.Id || 0, shiff: "Siang" };
                const res = await this.call({ method: 'path', table: 'staff', params: [payload] });
                if (res) {
                    if (this.form.Id) {
                        const index = this.staffs.findIndex(s => (s.Id || s.id) == this.form.Id);
                        if (index !== -1) this.staffs.splice(index, 1, { ...payload });
                    } else {
                        const newEntry = { ...payload, Id: res.id || Date.now() };
                        this.staffs = [newEntry, ...this.staffs];
                    }
                    this.showModal = false;
                }
            },

            async deleteStaff(id) {
                if (!confirm('Hapus data node ini dari sistem?')) return;
                const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                if (res) await this.getStaff();
            }
        }
    }
</script>
</body>
</html>
