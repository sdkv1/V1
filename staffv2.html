<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE CHAIN - Staff Management V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-text { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .bg-grid { background-size: 20px 20px; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); }
        
        /* Form Styling Custom */
        input, select, textarea { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: #fff !important;
            transition: all 0.3s ease;
        }
        input:focus, select:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); outline: none; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen bg-grid" x-data="staffApp()" x-init="init()">

<div class="max-w-[1100px] mx-auto w-full">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-900/40 p-6 rounded-2xl border border-white/5 shadow-2xl glass">
        <div>
            <h1 class="text-xl font-black tracking-[0.2em] uppercase italic neon-text">STAFF <span class="text-white">NODE</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                <p class="text-[9px] text-blue-400 font-mono uppercase tracking-[0.2em]">Registry_System // V3.0.1</p>
            </div>
        </div>

        <div class="flex gap-3">
            <button @click="openModal('add')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20">
                + Mint New Staff
            </button>
        </div>
    </div>

    <div class="glass rounded-2xl shadow-2xl border border-white/10 overflow-hidden relative">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/80 text-slate-500 text-[8px] uppercase font-black tracking-widest border-b border-white/5">
                        <th class="px-6 py-4">Identity & Posisi</th>
                        <th class="px-6 py-4">Assignment / Job</th>
                        <th class="px-6 py-4">Node / Outlet</th>
                        <th class="px-6 py-4 text-center">Status</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="staff in pagedStaff()" :key="staff.id">
                        <tr class="hover:bg-blue-600/[0.04] transition-all group border-l-2 border-l-transparent hover:border-l-blue-500">
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-100 text-[13px] tracking-tight" x-text="staff.nama"></span>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[9px] text-blue-400 font-black uppercase tracking-widest" x-text="staff.posisi"></span>
                                        <span class="text-[8px] text-slate-600 font-mono" x-text="'ID:' + staff.id"></span>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1">
                                    <span class="text-[10px] text-slate-300 font-medium" x-text="'Job: ' + staff.job"></span>
                                    <span :class="staff.shiff === 'Siang' ? 'text-orange-400' : 'text-indigo-400'" 
                                          class="text-[9px] font-mono uppercase font-bold tracking-tighter" 
                                          x-text="'Shift_' + staff.shiff"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="inline-block px-2.5 py-1 rounded bg-slate-950/50 border border-white/5">
                                    <span class="text-[9px] text-slate-400 font-mono uppercase tracking-tighter" x-text="staff.outlet"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span :class="staff.status === 'Aktif' ? 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20' : 'text-red-400 bg-red-400/10 border-red-400/20'" 
                                      class="text-[8px] font-black uppercase px-3 py-1 rounded-full border shadow-inner" 
                                      x-text="staff.status === 'Aktif' ? 'online' : 'offline'">
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex justify-end gap-2 opacity-40 group-hover:opacity-100 transition-opacity">
                                    <button @click="openModal('edit', staff)" class="p-2 hover:bg-blue-500/20 rounded-lg text-blue-400 transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    </button>
                                    <button @click="burnStaff(staff.id)" class="p-2 hover:bg-red-500/20 rounded-lg text-red-400 transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-900/40 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest" x-text="`Record ${startRange()} - ${endRange()} of ${staffData.length}`"></span>
            
            <div class="flex items-center gap-1">
                <button @click="prevPage()" :disabled="page === 1" class="px-4 py-2 bg-white/5 hover:bg-blue-600/20 disabled:opacity-10 rounded-lg border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">Prev</button>
                
                <div class="flex gap-1 px-2">
                    <template x-for="p in totalPages" :key="p">
                        <button @click="page = p" :class="page === p ? 'bg-blue-600 text-white border-blue-500' : 'bg-white/5 text-slate-500 border-white/5'" class="w-8 h-8 rounded-lg border text-[10px] font-bold transition-all" x-text="p"></button>
                    </template>
                </div>

                <button @click="nextPage()" :disabled="page >= totalPages" class="px-4 py-2 bg-white/5 hover:bg-blue-600/20 disabled:opacity-10 rounded-lg border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">Next</button>
            </div>
        </div>
    </div>

    <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md">
        <div @click.away="modalOpen = false" class="glass w-full max-w-lg rounded-3xl border border-white/10 shadow-2xl overflow-hidden" x-transition>
            <div class="p-6 border-b border-white/5 bg-slate-900/50 flex justify-between items-center">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-blue-400" x-text="editMode ? 'Modify Registry' : 'New Minting'"></h3>
                <button @click="modalOpen = false" class="text-slate-500 hover:text-white">&times;</button>
            </div>
            
            <form @submit.prevent="commitStaff" class="p-8 space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-2 block">Full Name</label>
                        <input type="text" x-model="formData.nama" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Input Name..." required>
                    </div>
                    
                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-2 block">Position</label>
                        <select x-model="formData.posisi" class="w-full px-4 py-3 rounded-xl text-sm appearance-none cursor-pointer">
                            <option value="cs">CS</option>
                            <option value="teknisi">TEKNISI</option>
                            <option value="admin">ADMIN</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-2 block">Shift</label>
                        <select x-model="formData.shiff" class="w-full px-4 py-3 rounded-xl text-sm appearance-none cursor-pointer">
                            <option value="Pagi">Pagi</option>
                            <option value="Siang">Siang</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-2 block">Job Description</label>
                        <input type="text" x-model="formData.job" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Contoh: Mesin">
                    </div>

                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-2 block">Status</label>
                        <select x-model="formData.status" class="w-full px-4 py-3 rounded-xl text-sm appearance-none cursor-pointer">
                            <option value="Aktif">Aktif (Online)</option>
                            <option value="Non Aktif">Non Aktif (Offline)</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-[8px] uppercase font-black text-slate-500 tracking-widest mb-2 block">Outlet Assignment</label>
                        <input type="text" x-model="formData.outlet" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Contoh: S01 TIMORITEL MADIUN">
                    </div>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="button" @click="modalOpen = false" class="flex-1 px-4 py-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition-all text-slate-400">Abort</button>
                    <button type="submit" class="flex-1 px-4 py-4 rounded-2xl bg-blue-600 text-white text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 shadow-xl shadow-blue-600/30 transition-all" x-text="editMode ? 'Commit Sync' : 'Mint Staff'"></button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function staffApp() {
        return {
            modalOpen: false,
            editMode: false,
            
            // Pagination State
            page: 1,
            perPage: 5,
            totalPages: 1,

            // Data Store
            staffData: [
                { id: 349, nama: "Hazwa Fattihana", outlet: "S01 TIMORITEL MADIUN", posisi: "cs", shiff: "Siang", status: "Non Aktif", job: 'Mesin' },
                { id: 350, nama: "Budi Santoso", outlet: "S02 TIMORITEL SOLO", posisi: "teknisi", shiff: "Pagi", status: "Aktif", job: 'Hardware' },
                { id: 351, nama: "Andi Wijaya", outlet: "S01 TIMORITEL MADIUN", posisi: "admin", shiff: "Siang", status: "Aktif", job: 'Finance' },
                { id: 352, nama: "Siti Aminah", outlet: "S03 TIMORITEL YOGYA", posisi: "cs", shiff: "Pagi", status: "Non Aktif", job: 'Sparepart' },
                { id: 353, nama: "Rizky Pratama", outlet: "S02 TIMORITEL SOLO", posisi: "teknisi", shiff: "Siang", status: "Aktif", job: 'Software' },
                { id: 354, nama: "Dewi Lestari", outlet: "S01 TIMORITEL MADIUN", posisi: "cs", shiff: "Pagi", status: "Aktif", job: 'Reception' }
            ],

            formData: { id: '', nama: '', outlet: '', posisi: 'cs', shiff: 'Pagi', status: 'Aktif', job: '' },

            init() {
                this.updatePagination();
            },

            updatePagination() {
                this.totalPages = Math.max(1, Math.ceil(this.staffData.length / this.perPage));
            },

            pagedStaff() {
                const start = (this.page - 1) * this.perPage;
                return this.staffData.slice(start, start + this.perPage);
            },

            startRange() { return (this.page - 1) * this.perPage + 1; },
            endRange() { return Math.min(this.page * this.perPage, this.staffData.length); },

            nextPage() { if(this.page < this.totalPages) this.page++; },
            prevPage() { if(this.page > 1) this.page--; },

            openModal(mode, data = null) {
                this.editMode = mode === 'edit';
                if (this.editMode && data) {
                    this.formData = { ...data };
                } else {
                    this.formData = { id: Date.now().toString().slice(-3), nama: '', outlet: '', posisi: 'cs', shiff: 'Pagi', status: 'Aktif', job: '' };
                }
                this.modalOpen = true;
            },

            commitStaff() {
                if (this.editMode) {
                    const idx = this.staffData.findIndex(s => s.id == this.formData.id);
                    if (idx !== -1) this.staffData[idx] = { ...this.formData };
                } else {
                    this.staffData.unshift({ ...this.formData });
                    this.page = 1; // Back to first page to see new entry
                }
                this.updatePagination();
                this.modalOpen = false;
            },

            burnStaff(id) {
                if (confirm('Execute removal for Node ID: ' + id + '?')) {
                    this.staffData = this.staffData.filter(s => s.id != id);
                    this.updatePagination();
                    if (this.page > this.totalPages) this.page = this.totalPages;
                }
            }
        }
    }
</script>

</body>
</html>
