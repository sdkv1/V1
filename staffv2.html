<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE CHAIN - Staff Registry V3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-text { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .bg-grid { background-size: 20px 20px; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); }
        
        input, select { 
            background: rgba(15, 23, 42, 0.9) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: #fff !important;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen bg-grid" x-data="staffManager()" x-init="getStaff()">

<div class="max-w-[1100px] mx-auto w-full">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-900/40 p-6 rounded-2xl border border-white/5 shadow-2xl glass">
        <div>
            <h1 class="text-xl font-black tracking-[0.2em] uppercase italic neon-text">STAFF <span class="text-white">NODE</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="relative flex h-2 w-2">
                    <span :class="loading ? 'animate-ping' : ''" class="absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                <p class="text-[9px] text-blue-400 font-mono uppercase tracking-[0.2em]" x-text="loading ? 'Syncing_Data...' : 'Registry_System // Live'"></p>
            </div>
        </div>

        <div class="flex items-center gap-3">
             <select x-model="rowsPerPage" @change="currentPage = 1" class="bg-slate-900/50 border border-white/10 rounded-xl px-3 py-2 text-[10px] font-black text-blue-400 outline-none cursor-pointer uppercase">
                <option value="10">10 Rows</option>
                <option value="25">25 Rows</option>
                <option value="50">50 Rows</option>
            </select>
            <button @click="openModal('add')" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20 active:scale-95">
                + Mint New Staff
            </button>
        </div>
    </div>

    <div class="glass rounded-2xl shadow-2xl border border-white/10 overflow-hidden relative">
        <div class="overflow-x-auto custom-scrollbar">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/80 text-slate-500 text-[8px] uppercase font-black tracking-widest border-b border-white/5">
                        <th class="px-6 py-5">Personnel & Role</th>
                        <th class="px-6 py-5">Assignment / Job</th>
                        <th class="px-6 py-5">Node / Outlet</th>
                        <th class="px-6 py-5 text-center">Status Control</th>
                        <th class="px-6 py-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-blue-600/[0.04] transition-all group border-l-2 border-l-transparent hover:border-l-blue-500">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="relative flex-shrink-0">
                                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600/20 to-slate-800/40 border border-white/10 flex items-center justify-center shadow-inner group-hover:border-blue-500/50 transition-all">
                                            <span class="text-[10px] font-black text-blue-400 uppercase tracking-tighter" x-text="(item.nama || item.Nama || '??').substring(0, 2)"></span>
                                        </div>
                                        <div :class="(item.status || item.Status) === 'Aktif' ? 'bg-emerald-500' : 'bg-slate-600'" 
                                             class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full border-2 border-[#020617]"></div>
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="font-bold text-slate-100 text-[13px] tracking-tight group-hover:text-blue-200 transition-colors" x-text="item.nama || item.Nama"></span>
                                        <div class="flex items-center gap-2 mt-0.5">
                                            <span class="text-[8px] text-blue-400 font-black uppercase tracking-[0.1em]" x-text="item.posisi || item.Posisi"></span>
                                            <span class="text-[8px] text-slate-600 font-mono" x-text="'ID:' + (item.id || item.Id)"></span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1">
                                    <span class="text-[10px] text-slate-300 font-medium" x-text="'Task: ' + (item.job || item.Job)"></span>
                                    <span :class="(item.shiff || item.Shiff) === 'Siang' ? 'text-orange-400' : 'text-indigo-400'" 
                                          class="text-[9px] font-mono uppercase font-black tracking-tighter" 
                                          x-text="'Shift_' + (item.shiff || item.Shiff || 'Siang')"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="inline-block px-3 py-1 rounded bg-slate-950/50 border border-white/5">
                                    <span class="text-[9px] text-slate-400 font-mono uppercase tracking-tighter" x-text="item.outlet || item.Outlet"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="relative inline-block text-left" x-data="{ openMenu: false }" @click.away="openMenu = false">
                                    <button @click="openMenu = !openMenu" 
                                            class="flex items-center gap-2 mx-auto px-3 py-1.5 rounded-lg bg-slate-900/50 border border-white/10 hover:border-blue-500/30 transition-all active:scale-95">
                                        <span :class="(item.status || item.Status) === 'Aktif' ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-red-500 shadow-[0_0_8px_#ef4444]'" 
                                              class="w-1.5 h-1.5 rounded-full animate-pulse"></span>
                                        <span class="text-[8px] font-black uppercase tracking-widest" 
                                              :class="(item.status || item.Status) === 'Aktif' ? 'text-emerald-400' : 'text-red-400'" 
                                              x-text="(item.status || item.Status) === 'Aktif' ? 'online' : 'offline'"></span>
                                        <svg class="w-3 h-3 text-slate-600" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" /></svg>
                                    </button>
                                    <div x-show="openMenu" x-cloak class="absolute left-1/2 -translate-x-1/2 mt-2 w-32 rounded-xl glass border border-white/10 shadow-2xl z-50 overflow-hidden">
                                        <button @click="quickUpdate(item, 'status', 'Aktif'); openMenu = false" class="flex items-center w-full px-4 py-2 text-[9px] font-black uppercase tracking-widest text-emerald-400 hover:bg-emerald-500/10">Set Online</button>
                                        <button @click="quickUpdate(item, 'status', 'non aktif'); openMenu = false" class="flex items-center w-full px-4 py-2 text-[9px] font-black uppercase tracking-widest text-red-400 hover:bg-red-500/10 border-t border-white/5">Set Offline</button>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex justify-end gap-1 opacity-20 group-hover:opacity-100 transition-opacity">
                                    <button @click="openModal('edit', item)" class="p-2 hover:bg-blue-500/20 rounded-lg text-blue-400 transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    </button>
                                    <button @click="deleteStaff(item.id || item.Id)" class="p-2 hover:bg-red-500/20 rounded-lg text-red-400 transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-900/60 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-[0.2em]" x-text="`Record ${startRange} - ${endRange} of ${staffs.length}`"></span>
            <div class="flex items-center gap-2">
                <button @click="currentPage = 1" :disabled="currentPage === 1" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-white disabled:opacity-0 transition-all"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"></path></svg></button>
                <button @click="currentPage--" :disabled="currentPage === 1" class="px-4 py-2 bg-white/5 hover:bg-blue-600/20 disabled:opacity-5 rounded-xl border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">Prev</button>
                <div class="px-4 font-mono text-[10px] font-black text-blue-400"><span x-text="currentPage"></span> / <span class="text-slate-600" x-text="totalPages"></span></div>
                <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-4 py-2 bg-white/5 hover:bg-blue-600/20 disabled:opacity-5 rounded-xl border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">Next</button>
            </div>
        </div>
    </div>

    <div x-show="showModal" x-cloak class="fixed inset-0 z-[100] flex justify-center items-start pt-12 md:pt-20 p-4 bg-slate-950/90 backdrop-blur-md overflow-y-auto">
        <div @click.away="showModal = false" class="glass w-full max-w-md rounded-2xl border border-white/10 shadow-2xl overflow-hidden mb-10" x-transition:enter="duration-200 ease-out" x-transition:enter-start="opacity-0 -translate-y-4 scale-95">
            <div class="px-5 py-4 border-b border-white/5 bg-slate-900/50 flex justify-between items-center">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400" x-text="mode === 'edit' ? 'Modify Personnel' : 'New Registration'"></h3>
                <button @click="showModal = false" class="text-slate-500 hover:text-white text-xl">&times;</button>
            </div>
            <form @submit.prevent="saveStaff" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Full Name</label>
                        <input type="text" x-model="form.nama" class="w-full px-4 py-2.5 rounded-xl text-xs" placeholder="Name..." required>
                    </div>
                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Position</label>
                        <select x-model="form.posisi" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="Teknisi">Teknisi</option>
                            <option value="Admin">Admin</option>
                            <option value="Frontliner">CS</option>
                            <option value="Kepala Cabang">KACAB</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Shift</label>
                        <select x-model="form.shiff" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="Pagi">Pagi</option>
                            <option value="Siang">Siang</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Job Desc</label>
                        <select x-model="form.job" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="Mesin">Mesin</option>
                            <option value="Interface">Interface</option>
                            <option value="Software">Software</option>
                            <option value="Aksesoris">Aksesori</option>
                            <option value="General">General</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Status</label>
                        <select x-model="form.status" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="Aktif">Aktif</option>
                            <option value="non aktif">Non Aktif</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Outlet Assignment</label>
                        <input type="text" x-model="form.outlet" class="w-full px-4 py-2.5 rounded-xl text-xs" placeholder="Outlet Name..." required>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" @click="showModal = false" class="flex-1 px-3 py-3 rounded-xl border border-white/5 text-[9px] font-black uppercase text-slate-500">Abort</button>
                    <button type="submit" class="flex-1 px-3 py-3 rounded-xl bg-blue-600 text-white text-[9px] font-black uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-all" x-text="mode === 'edit' ? 'Update Node' : 'Mint Personnel'"></button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
            form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Siang' },

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; },
            get startRange() { return this.staffs.length === 0 ? 0 : (this.currentPage - 1) * this.rowsPerPage + 1; },
            get endRange() { return Math.min(this.currentPage * this.rowsPerPage, this.staffs.length); },

            async call(payload) {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    alert('Network Error: ' + err.message); return null;
                } finally { this.loading = false; }
            },

            async getStaff() {
                const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                if (res && res.data) {
                    this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    this.currentPage = 1;
                }
            },

            async quickUpdate(item, field, value) {
                const id = item.id || item.Id;
                const updatedData = { ...item, [field]: value, id: id };
                const res = await this.call({ method: 'path', table: 'staff', params: [updatedData] });
                if (res) {
                    const idx = this.staffs.findIndex(s => (s.id || s.Id) == id);
                    if (idx !== -1) {
                        const capitalizedField = field.charAt(0).toUpperCase() + field.slice(1);
                        this.staffs[idx][field] = value;
                        this.staffs[idx][capitalizedField] = value; // Sync both cases
                    }
                }
            },

            openModal(mode, item = null) {
                this.mode = mode; this.showModal = true;
                if (mode === 'edit' && item) {
                    this.form = {
                        Id: item.id || item.Id, nama: item.nama || item.Nama,
                        outlet: item.outlet || item.Outlet, posisi: item.posisi || item.Posisi,
                        status: item.status || item.Status, job: item.job || item.Job,
                        shiff: item.shiff || item.Shiff || 'Siang'
                    };
                } else {
                    this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Siang' };
                }
            },

            async saveStaff() {
                const payload = { ...this.form, id: this.form.Id || 0 };
                const res = await this.call({ method: 'path', table: 'staff', params: [payload] });
                if (res) {
                    if (this.form.Id) {
                        const index = this.staffs.findIndex(s => (s.Id || s.id) == this.form.Id);
                        if (index !== -1) this.staffs.splice(index, 1, { ...payload });
                    } else {
                        await this.getStaff(); // Refresh for new data
                    }
                    this.showModal = false;
                }
            },

            async deleteStaff(id) {
                if (!confirm('Burn data node ini dari sistem?')) return;
                const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                if (res) await this.getStaff();
            }
        }
    }
</script>
</body>
</html>
