<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Node v1.2 - Hybrid Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #0f172a 80%);
            min-height: 100vh;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .input-dark {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body class="p-4 lg:p-8" x-data="staffManager()" x-init="getStaff()">

<div class="max-w-[1200px] mx-auto w-full">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h2 class="text-2xl font-black neon-text uppercase tracking-tighter italic">STAFF <span class="text-white">NODE</span></h2>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <p class="text-[9px] text-slate-500 font-mono uppercase tracking-widest">System_Online // <span x-text="staffs.length"></span> Nodes</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3 w-full md:w-auto">
            <select x-model="rowsPerPage" @change="currentPage = 1" class="flex-1 md:flex-none bg-slate-800 border border-white/5 rounded-xl px-4 py-3 text-[10px] font-black text-green-400 uppercase outline-none cursor-pointer">
                <option value="10">10 Rows</option>
                <option value="25">25 Rows</option>
                <option value="50">50 Rows</option>
            </select>
            <button @click="openModal('add')" class="flex-[2] md:flex-none px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-black rounded-xl transition-all shadow-lg shadow-green-900/20 text-[10px] uppercase tracking-widest active:scale-95">
                + Mint Personnel
            </button>
        </div>
    </div>

    <div class="relative min-h-[400px]">
        
        <div class="hidden md:block glass rounded-3xl border border-white/10 overflow-visible shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-400 text-[9px] uppercase font-black tracking-widest border-b border-white/5">
                        <th class="px-8 py-5">Personnel</th>
                        <th class="px-8 py-5">Node Context</th>
                        <th class="px-8 py-5 text-center">Status</th>
                        <th class="px-8 py-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-white/[0.03] transition-all group">
                            <td class="px-8 py-4">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-2xl bg-slate-800 flex items-center justify-center border border-white/5 group-hover:border-green-500/30 transition-colors">
                                        <span class="text-[10px] font-mono text-green-500 font-bold" x-text="(item.nama || item.Nama || '??').substring(0, 2).toUpperCase()"></span>
                                    </div>
                                    <div>
                                        <div class="font-bold text-slate-100 text-sm" x-text="item.nama || item.Nama"></div>
                                        <div class="text-[9px] text-slate-500 uppercase font-black" x-text="item.posisi || item.Posisi"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-4">
                                <div class="text-slate-300 text-xs font-mono truncate max-w-[200px]" x-text="item.outlet || item.Outlet"></div>
                                <div class="text-[9px] text-blue-400 font-black uppercase mt-0.5" x-text="'Specialization: ' + (item.job || item.Job)"></div>
                            </td>
                            <td class="px-8 py-4 text-center">
                                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-900/50 border border-white/5">
                                    <span :class="(item.status || item.Status) === 'Aktif' ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-red-500 shadow-[0_0_8px_#ef4444]'" 
                                          class="w-1.5 h-1.5 rounded-full"></span>
                                    <span class="text-[9px] font-black uppercase tracking-widest" 
                                          :class="(item.status || item.Status) === 'Aktif' ? 'text-green-400' : 'text-red-400'" 
                                          x-text="item.status || item.Status"></span>
                                </div>
                            </td>
                            <td class="px-8 py-4 text-right">
                                <div x-data="{ mOpen: false }" class="relative inline-block" @click.away="mOpen = false">
                                    <button @click="mOpen = !mOpen" class="p-2 hover:bg-slate-700/50 rounded-xl transition-all border border-transparent hover:border-white/10 active:scale-90">
                                        <svg class="w-5 h-5 text-slate-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                                    </button>
                                    <div x-show="mOpen" x-cloak x-transition class="absolute right-0 top-full mt-2 w-40 bg-[#1e293b] border border-white/20 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] z-[100] overflow-hidden">
                                        <div class="p-1 bg-slate-900/40">
                                            <button @click="quickUpdate(item, 'status', 'Aktif'); mOpen = false" class="w-full text-left px-4 py-2.5 text-[9px] font-black text-green-400 hover:bg-green-400/10 rounded-xl uppercase transition-colors">Set Online</button>
                                            <button @click="quickUpdate(item, 'status', 'non aktif'); mOpen = false" class="w-full text-left px-4 py-2.5 text-[9px] font-black text-red-400 hover:bg-red-400/10 rounded-xl uppercase transition-colors">Set Offline</button>
                                        </div>
                                        <div class="h-[1px] bg-white/5"></div>
                                        <button @click="openModal('edit', item); mOpen = false" class="w-full text-left px-4 py-3 text-[10px] font-black text-blue-400 hover:bg-blue-400/10 uppercase tracking-widest">Edit Node</button>
                                        <button @click="deleteStaff(item.id || item.Id); mOpen = false" class="w-full text-left px-4 py-3 text-[10px] font-black text-red-500 hover:bg-red-500/10 border-t border-white/5 uppercase tracking-widest">Burn Node</button>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="md:hidden space-y-4">
            <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                <div class="glass p-5 rounded-3xl border border-white/10 relative shadow-xl overflow-visible">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-slate-800 flex items-center justify-center border border-white/5 shadow-inner">
                                <span class="text-xs font-mono text-green-500 font-bold" x-text="(item.nama || item.Nama || '??').substring(0, 2).toUpperCase()"></span>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-100 text-sm" x-text="item.nama || item.Nama"></h4>
                                <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]" x-text="item.posisi || item.Posisi"></p>
                            </div>
                        </div>
                        
                        <div x-data="{ mOpen: false }" class="relative">
                            <button @click="mOpen = !mOpen" @click.away="mOpen = false" class="p-3 bg-slate-800 rounded-2xl border border-white/5 active:scale-90 transition-all shadow-lg">
                                <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                            </button>
                            <div x-show="mOpen" x-cloak x-transition class="absolute right-0 top-14 w-40 bg-[#1e293b] border border-white/20 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,1)] z-[150] overflow-hidden">
                                <button @click="quickUpdate(item, 'status', 'Aktif'); mOpen = false" class="w-full text-left px-5 py-4 text-[10px] font-black text-green-400 border-b border-white/5 uppercase">Set Online</button>
                                <button @click="quickUpdate(item, 'status', 'non aktif'); mOpen = false" class="w-full text-left px-5 py-4 text-[10px] font-black text-red-400 border-b border-white/5 uppercase">Set Offline</button>
                                <button @click="openModal('edit', item); mOpen = false" class="w-full text-left px-5 py-4 text-[10px] font-black text-blue-400 border-b border-white/5 uppercase">Edit Node</button>
                                <button @click="deleteStaff(item.id || item.Id); mOpen = false" class="w-full text-left px-5 py-4 text-[10px] font-black text-red-500 uppercase">Burn Node</button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <div class="bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                            <p class="text-[7px] text-slate-500 uppercase font-black mb-1 tracking-widest">Node Context</p>
                            <p class="text-[10px] text-slate-300 font-mono truncate" x-text="item.outlet || item.Outlet"></p>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-2xl border border-white/5 flex flex-col justify-center items-center">
                            <p class="text-[7px] text-slate-500 uppercase font-black mb-1 tracking-widest">Status</p>
                            <div class="flex items-center gap-2">
                                <span :class="(item.status || item.Status) === 'Aktif' ? 'bg-green-500' : 'bg-red-500'" class="w-1.5 h-1.5 rounded-full"></span>
                                <span :class="(item.status || item.Status) === 'Aktif' ? 'text-green-400' : 'text-red-400'" 
                                      class="text-[10px] font-black uppercase" x-text="item.status || item.Status"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

    </div>

    <div class="mt-8 px-6 py-5 glass rounded-2xl border border-white/10 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-[10px] font-mono text-slate-500 uppercase font-black tracking-widest order-2 md:order-1">
            Displaying <span class="text-green-500" x-text="startRange"></span> - <span class="text-green-500" x-text="endRange"></span> of <span class="text-white" x-text="staffs.length"></span>
        </div>
        <div class="flex items-center gap-2 order-1 md:order-2">
            <button @click="currentPage--" :disabled="currentPage === 1" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-xl border border-slate-700 disabled:opacity-20 transition-all active:scale-90">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="px-6 py-2 bg-slate-900/50 rounded-xl border border-white/5 font-mono text-xs text-green-400 font-bold" x-text="currentPage"></div>
            <button @click="currentPage++" :disabled="currentPage === totalPages" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-xl border border-slate-700 disabled:opacity-20 transition-all active:scale-90">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>

    <div x-show="showModal" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md" x-transition>
        <div class="glass w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-white/10" @click.away="showModal = false">
            <div class="p-6 border-b border-white/5 bg-slate-900/50 flex justify-between items-center">
                <h3 class="text-[10px] font-black text-green-400 uppercase tracking-[0.3em]" x-text="mode === 'edit' ? 'MODIFY_NODE' : 'REGISTER_NODE'"></h3>
                <button @click="showModal = false" class="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-slate-400 hover:text-white transition-colors">&times;</button>
            </div>
            <form @submit.prevent="saveStaff" class="p-6 space-y-4">
                <div>
                    <label class="text-[8px] uppercase font-black text-slate-500 mb-1 block">Full Name</label>
                    <input type="text" x-model="form.nama" required class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-green-500/50">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 mb-1 block">Role</label>
                        <select x-model="form.posisi" class="w-full input-dark rounded-xl px-3 py-3 text-xs font-bold uppercase outline-none cursor-pointer">
                            <option value="Teknisi">Teknisi</option>
                            <option value="Admin">Admin</option>
                            <option value="Frontliner">CS</option>
                            <option value="Kepala Cabang">KACAB</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] uppercase font-black text-slate-500 mb-1 block">Status</label>
                        <select x-model="form.status" class="w-full input-dark rounded-xl px-3 py-3 text-xs font-bold uppercase outline-none cursor-pointer">
                            <option value="Aktif">Aktif</option>
                            <option value="non aktif">Non Aktif</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[8px] uppercase font-black text-slate-500 mb-1 block">Outlet Assignment</label>
                    <input type="text" x-model="form.outlet" required class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="text-[8px] uppercase font-black text-slate-500 mb-1 block">Specialization</label>
                    <input type="text" x-model="form.job" class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold outline-none">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" @click="showModal = false" class="flex-1 px-3 py-4 rounded-xl border border-white/5 text-[9px] font-black uppercase text-slate-500">Abort</button>
                    <button type="submit" class="flex-1 px-3 py-4 rounded-xl bg-green-600 text-white text-[9px] font-black uppercase shadow-lg shadow-green-900/40" x-text="loading ? 'SYNCING...' : (mode === 'edit' ? 'Update Node' : 'Register Node')"></button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
            form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' },

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; },
            get startRange() { return this.staffs.length === 0 ? 0 : (this.currentPage - 1) * this.rowsPerPage + 1; },
            get endRange() { return Math.min(this.currentPage * this.rowsPerPage, this.staffs.length); },

            async call(payload) {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) { return null; } finally { this.loading = false; }
            },

            async getStaff() {
                const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                if (res && res.data) {
                    this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                }
            },

            async quickUpdate(item, field, value) {
                const id = item.id || item.Id;
                const updatedData = { ...item, [field]: value, id: id, shiff: 'Siang' };
                const res = await this.call({ method: 'path', table: 'staff', params: [updatedData] });
                if (res) {
                    const idx = this.staffs.findIndex(s => (s.id || s.Id) == id);
                    if (idx !== -1) {
                        this.staffs[idx].status = value;
                        this.staffs[idx].Status = value;
                    }
                }
            },

            openModal(mode, item = null) {
                this.mode = mode; this.showModal = true;
                if (mode === 'edit' && item) {
                    this.form = {
                        Id: item.id || item.Id, nama: item.nama || item.Nama,
                        outlet: item.outlet || item.Outlet, posisi: item.posisi || item.Posisi,
                        status: item.status || item.Status, job: item.job || item.Job
                    };
                } else {
                    this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' };
                }
            },

            async saveStaff() {
                const payload = { ...this.form, id: this.form.Id || 0, shiff: 'Siang' };
                const res = await this.call({ method: 'path', table: 'staff', params: [payload] });
                if (res) {
                    await this.getStaff();
                    this.showModal = false;
                }
            },

            async deleteStaff(id) {
                if (!confirm('Hapus node ini dari sistem?')) return;
                const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                if (res) await this.getStaff();
            }
        }
    }
</script>
</body>
</html>
