<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE CHAIN - Staff Registry V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-text { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .bg-grid { background-size: 20px 20px; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); }
        
        input, select { 
            background: rgba(15, 23, 42, 0.9) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: #fff !important;
        }
        input:focus, select:focus { border-color: #3b82f6 !important; outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.15); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen bg-grid" x-data="staffApp()" x-init="init()">

<div class="max-w-[1100px] mx-auto w-full">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-900/40 p-6 rounded-2xl border border-white/5 shadow-2xl glass">
        <div>
            <h1 class="text-xl font-black tracking-[0.2em] uppercase italic neon-text">STAFF <span class="text-white">NODE</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                <p class="text-[9px] text-blue-400 font-mono uppercase tracking-[0.2em]">Registry_System // Live_Update</p>
            </div>
        </div>

        <button @click="openModal('add')" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-blue-600/20 active:scale-95">
            + Mint New Staff
        </button>
    </div>

    <div class="glass rounded-2xl shadow-2xl border border-white/10 overflow-hidden relative">
        <div class="overflow-x-auto custom-scrollbar">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/80 text-slate-500 text-[8px] uppercase font-black tracking-widest border-b border-white/5">
                        <th class="px-6 py-5">Personnel & Role</th>
                        <th class="px-6 py-5">Assignment / Job</th>
                        <th class="px-6 py-5">Node / Outlet</th>
                        <th class="px-6 py-5 text-center">Status Control</th>
                        <th class="px-6 py-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="staff in pagedStaff()" :key="staff.id">
                        <tr class="hover:bg-blue-600/[0.04] transition-all group border-l-2 border-l-transparent hover:border-l-blue-500">
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-100 text-[13px] tracking-tight group-hover:text-blue-200" x-text="staff.nama"></span>
                                    <div class="flex items-center gap-2 mt-0.5">
                                        <span class="text-[9px] text-blue-400 font-black uppercase tracking-widest" x-text="staff.posisi"></span>
                                        <span class="text-[8px] text-slate-600 font-mono" x-text="'ID:' + staff.id"></span>
                                    </div>
                                </div>
                            </td>

                            <td class="px-6 py-4">
    <div class="flex items-center gap-4">
        <div class="relative flex-shrink-0">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600/20 to-slate-800/40 border border-white/10 flex items-center justify-center shadow-inner group-hover:border-blue-500/50 transition-all">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-tighter" x-text="staff.nama.substring(0, 2)"></span>
            </div>
            <div :class="staff.status === 'Aktif' ? 'bg-emerald-500' : 'bg-slate-600'" 
                 class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full border-2 border-[#020617]"></div>
        </div>

        <div class="flex flex-col">
            <span class="font-bold text-slate-100 text-[13px] tracking-tight group-hover:text-blue-200 transition-colors" x-text="staff.nama"></span>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[8px] text-blue-400 font-black uppercase tracking-[0.1em]" x-text="staff.posisi"></span>
                <span class="text-[8px] text-slate-600 font-mono" x-text="'ID:' + staff.id"></span>
            </div>
        </div>
    </div>
</td>


                            <td class="px-6 py-4">
                                <div class="inline-block px-3 py-1 rounded bg-slate-950/50 border border-white/5">
                                    <span class="text-[9px] text-slate-400 font-mono uppercase tracking-tighter" x-text="staff.outlet"></span>
                                </div>
                            </td>

                            <td class="px-6 py-4 text-center">
                                <div class="relative inline-block text-left" x-data="{ openMenu: false }" @click.away="openMenu = false">
                                    <button @click="openMenu = !openMenu" 
                                            class="flex items-center gap-2 mx-auto px-3 py-1.5 rounded-lg bg-slate-900/50 border border-white/10 hover:border-blue-500/30 transition-all active:scale-95">
                                        <span :class="staff.status === 'Aktif' ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-red-500 shadow-[0_0_8px_#ef4444]'" 
                                              class="w-1.5 h-1.5 rounded-full animate-pulse"></span>
                                        <span class="text-[8px] font-black uppercase tracking-widest" 
                                              :class="staff.status === 'Aktif' ? 'text-emerald-400' : 'text-red-400'" 
                                              x-text="staff.status === 'Aktif' ? 'online' : 'offline'"></span>
                                        <svg class="w-3 h-3 text-slate-600" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" /></svg>
                                    </button>

                                    <div x-show="openMenu" x-cloak 
                                         x-transition:enter="transition ease-out duration-100"
                                         x-transition:enter-start="transform opacity-0 scale-95"
                                         x-transition:enter-end="transform opacity-100 scale-100"
                                         class="absolute left-1/2 -translate-x-1/2 mt-2 w-32 rounded-xl glass border border-white/10 shadow-2xl z-50 overflow-hidden">
                                        <div class="py-1">
                                            <button @click="toggleStatus(staff.id, 'Aktif'); openMenu = false" class="flex items-center w-full px-4 py-2 text-[9px] font-black uppercase tracking-widest text-emerald-400 hover:bg-emerald-500/10">
                                                Set Online
                                            </button>
                                            <button @click="toggleStatus(staff.id, 'Non Aktif'); openMenu = false" class="flex items-center w-full px-4 py-2 text-[9px] font-black uppercase tracking-widest text-red-400 hover:bg-red-500/10 border-t border-white/5">
                                                Set Offline
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </td>

                            <td class="px-6 py-4 text-right">
                                <div class="flex justify-end gap-1 opacity-20 group-hover:opacity-100 transition-opacity">
                                    <button @click="openModal('edit', staff)" class="p-2 hover:bg-blue-500/20 rounded-lg text-blue-400 transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    </button>
                                    <button @click="burnStaff(staff.id)" class="p-2 hover:bg-red-500/20 rounded-lg text-red-400 transition-colors">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-900/60 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-[0.2em]" x-text="`Record ${startRange()} - ${endRange()} of ${staffData.length}`"></span>
            
            <div class="flex items-center gap-2">
                <button @click="prevPage()" :disabled="page === 1" class="px-4 py-2 bg-white/5 hover:bg-blue-600/20 disabled:opacity-5 rounded-xl border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">Prev</button>
                
                <div class="flex gap-1">
                    <template x-for="p in totalPages" :key="p">
                        <button @click="page = p" 
                                :class="page === p ? 'bg-blue-600 text-white border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)]' : 'bg-white/5 text-slate-500 border-white/5'" 
                                class="w-8 h-8 rounded-lg border text-[10px] font-black transition-all" x-text="p"></button>
                    </template>
                </div>

                <button @click="nextPage()" :disabled="page >= totalPages" class="px-4 py-2 bg-white/5 hover:bg-blue-600/20 disabled:opacity-5 rounded-xl border border-white/10 text-[9px] font-black uppercase tracking-widest transition-all">Next</button>
            </div>
        </div>
    </div>

  <div x-show="modalOpen" x-cloak 
         class="fixed inset-0 z-[100] flex justify-center items-start pt-12 md:pt-20 p-4 bg-slate-950/90 backdrop-blur-md overflow-y-auto">
        
        <div @click.away="modalOpen = false" 
             class="glass w-full max-w-md rounded-2xl border border-white/10 shadow-2xl overflow-hidden mb-10" 
             x-transition:enter="duration-200 ease-out" x-transition:enter-start="opacity-0 -translate-y-4 scale-95">
            
            <div class="px-5 py-4 border-b border-white/5 bg-slate-900/50 flex justify-between items-center">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400" x-text="editMode ? 'Modify Personnel' : 'New Registration'"></h3>
                <button @click="modalOpen = false" class="text-slate-500 hover:text-white text-xl">&times;</button>
            </div>
            
            <form @submit.prevent="commitStaff" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Full Name</label>
                        <input type="text" x-model="formData.nama" class="w-full px-4 py-2.5 rounded-xl text-xs" placeholder="Name..." required>
                    </div>
                    
                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Position</label>
                        <select x-model="formData.posisi" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="cs">CS</option>
                            <option value="teknisi">TEKNISI</option>
                            <option value="admin">ADMIN</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Initial Shift</label>
                        <select x-model="formData.shiff" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="Pagi">Pagi</option>
                            <option value="Siang">Siang</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Job Desc</label>
                        <input type="text" x-model="formData.job" class="w-full px-4 py-2.5 rounded-xl text-xs" placeholder="Ex: Mesin">
                    </div>

                    <div>
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Status</label>
                        <select x-model="formData.status" class="w-full px-4 py-2.5 rounded-xl text-xs cursor-pointer">
                            <option value="Aktif">Aktif</option>
                            <option value="Non Aktif">Non Aktif</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-[7px] uppercase font-black text-slate-500 mb-1 block tracking-widest">Outlet Assignment</label>
                        <input type="text" x-model="formData.outlet" class="w-full px-4 py-2.5 rounded-xl text-xs" placeholder="Outlet Name...">
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" @click="modalOpen = false" class="flex-1 px-3 py-3 rounded-xl border border-white/5 text-[9px] font-black uppercase text-slate-500 hover:bg-white/5 transition-all">Abort</button>
                    <button type="submit" class="flex-1 px-3 py-3 rounded-xl bg-blue-600 text-white text-[9px] font-black uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-all" x-text="editMode ? 'Update Node' : 'Mint Personnel'"></button>
                </div>
            </form>
        </div>
    </div>

</div>

<script>
    function staffApp() {
        return {
            modalOpen: false,
            editMode: false,
            page: 1,
            perPage: 5,
            totalPages: 1,

            // Initial Data sesuai format user
            staffData: [
                { id: 349, nama: "Hazwa Fattihana", outlet: "S01 TIMORITEL MADIUN", posisi: "cs", shiff: "Siang", status: "Non Aktif", job: 'Mesin' },
                { id: 350, nama: "Budi Santoso", outlet: "S02 TIMORITEL SOLO", posisi: "teknisi", shiff: "Pagi", status: "Aktif", job: 'Hardware' },
                { id: 351, nama: "Andi Wijaya", outlet: "S01 TIMORITEL MADIUN", posisi: "admin", shiff: "Siang", status: "Aktif", job: 'Finance' },
                { id: 352, nama: "Siti Aminah", outlet: "S03 TIMORITEL YOGYA", posisi: "cs", shiff: "Pagi", status: "Non Aktif", job: 'Sparepart' },
                { id: 353, nama: "Rizky Pratama", outlet: "S02 TIMORITEL SOLO", posisi: "teknisi", shiff: "Siang", status: "Aktif", job: 'Software' }
            ],

            formData: { id: '', nama: '', outlet: '', posisi: 'cs', shiff: 'Pagi', status: 'Aktif', job: '' },

            init() {
                this.updatePagination();
            },

            updatePagination() {
                this.totalPages = Math.max(1, Math.ceil(this.staffData.length / this.perPage));
            },

            pagedStaff() {
                const start = (this.page - 1) * this.perPage;
                return this.staffData.slice(start, start + this.perPage);
            },

            startRange() { return this.staffData.length === 0 ? 0 : (this.page - 1) * this.perPage + 1; },
            endRange() { return Math.min(this.page * this.perPage, this.staffData.length); },

            nextPage() { if(this.page < this.totalPages) this.page++; },
            prevPage() { if(this.page > 1) this.page--; },

            toggleStatus(id, newStatus) {
                const idx = this.staffData.findIndex(s => s.id == id);
                if (idx !== -1) {
                    this.staffData[idx].status = newStatus;
                }
            },

            openModal(mode, data = null) {
                this.editMode = mode === 'edit';
                if (this.editMode && data) {
                    this.formData = { ...data };
                } else {
                    this.formData = { id: Math.floor(Math.random() * 900) + 100, nama: '', outlet: '', posisi: 'cs', shiff: 'Pagi', status: 'Aktif', job: '' };
                }
                this.modalOpen = true;
            },

            commitStaff() {
                if (this.editMode) {
                    const idx = this.staffData.findIndex(s => s.id == this.formData.id);
                    if (idx !== -1) this.staffData[idx] = { ...this.formData };
                } else {
                    this.staffData.unshift({ ...this.formData });
                    this.page = 1;
                }
                this.updatePagination();
                this.modalOpen = false;
            },

            burnStaff(id) {
                if (confirm('Burn record ID ' + id + ' from chain?')) {
                    this.staffData = this.staffData.filter(s => s.id != id);
                    this.updatePagination();
                    if (this.page > this.totalPages) this.page = this.totalPages || 1;
                }
            }
        }
    }
</script>
</body>
</html>
