<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management v3 - Professional Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #f1f5f9; 
            color: #1e293b; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            letter-spacing: -0.02em;
        }
        .v3-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-radius: 1.5rem;
        }
        .v3-input {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .v3-input:focus {
            border-color: #6366f1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .btn-primary {
            background: #1e293b;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 lg:p-12">

<div class="max-w-7xl mx-auto" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
        <div>
            <div class="flex items-center gap-2 mb-1">
                <div class="w-2 h-8 bg-indigo-600 rounded-full"></div>
                <h2 class="text-4xl font-extrabold tracking-tight text-slate-900">Staff <span class="text-indigo-600">Hub</span></h2>
            </div>
            <p class="text-slate-500 font-medium ml-4">Manajemen operasional unit <span class="text-slate-900 font-bold" x-text="staffs.length"></span> personil terdaftar.</p>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="bg-white p-1.5 rounded-2xl border border-slate-200 flex items-center shadow-sm">
                <button @click="getStaff()" class="p-2.5 hover:bg-slate-50 rounded-xl text-slate-500 transition-colors" :class="loading ? 'animate-spin text-indigo-600' : ''">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <div class="h-6 w-[1px] bg-slate-200 mx-1"></div>
                <button @click="openModal('add')" class="btn-primary px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Tambah Staff
                </button>
            </div>
        </div>
    </div>

    <div class="v3-card overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div class="flex items-center gap-4">
                <select x-model="rowsPerPage" @change="currentPage = 1" class="bg-white border border-slate-200 text-xs font-bold py-2 px-3 rounded-lg outline-none focus:ring-2 ring-indigo-500/20">
                    <option value="10">10 Rows</option>
                    <option value="25">25 Rows</option>
                    <option value="50">50 Rows</option>
                </select>
                <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Database Monitoring</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-[11px] uppercase font-bold tracking-wider border-b border-slate-100">
                        <th class="px-8 py-5">Identitas</th>
                        <th class="px-8 py-5">Lokasi Penugasan</th>
                        <th class="px-8 py-5 text-center">Status Operasional</th>
                        <th class="px-8 py-5 text-right">Opsi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-slate-50/80 transition-colors group">
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs border border-indigo-100" x-text="(item.nama || 'U').substring(0,2).toUpperCase()"></div>
                                    <div>
                                        <div class="font-bold text-slate-900" x-text="item.nama || item.Nama"></div>
                                        <div class="text-[11px] text-slate-400 font-medium" x-text="item.posisi || item.Posisi"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-2">
                                    <svg class="w-3.5 h-3.5 text-slate-300" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                                    <span class="text-sm text-slate-600 font-medium" x-text="item.outlet || item.Outlet"></span>
                                </div>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <span :class="(item.status || item.Status) === 'Aktif' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'" 
                                      class="status-pill" x-text="item.status || item.Status"></span>
                                <div class="text-[10px] mt-1 font-bold text-indigo-400 uppercase tracking-tighter" x-text="item.job || item.Job"></div>
                            </td>
                            <td class="px-8 py-5 text-right">
                                <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click="openModal('edit', item)" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    </button>
                                    <button @click="deleteStaff(item.id || item.Id)" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="px-8 py-5 bg-slate-50/50 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <span class="text-xs font-semibold text-slate-500">
                Menampilkan <span class="text-slate-900" x-text="startRange"></span> - <span class="text-slate-900" x-text="endRange"></span> dari <span class="text-slate-900" x-text="staffs.length"></span> data
            </span>

            <div class="flex items-center gap-2">
                <button @click="currentPage--" :disabled="currentPage === 1" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30 transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div class="px-4 text-sm font-bold text-slate-900">
                    <span x-text="currentPage"></span> <span class="text-slate-300 mx-1">/</span> <span class="text-slate-400" x-text="totalPages"></span>
                </div>
                <button @click="currentPage++" :disabled="currentPage === totalPages" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30 transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6" x-cloak>
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" @click="showModal = false"></div>
        <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl z-10 overflow-hidden relative" x-transition>
            <div class="px-8 pt-8 pb-4">
                <h3 class="text-2xl font-extrabold text-slate-900" x-text="mode === 'edit' ? 'Perbarui Data' : 'Staff Baru'"></h3>
                <p class="text-sm text-slate-500 font-medium">Lengkapi parameter informasi personil di bawah ini.</p>
            </div>
            
            <form @submit.prevent="saveStaff" class="p-8 pt-4 space-y-5">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 ml-1">Nama Lengkap</label>
                    <input type="text" x-model="form.nama" required class="w-full v3-input rounded-2xl px-5 py-3 text-sm font-semibold outline-none" placeholder="Contoh: Budi Santoso">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-700 ml-1">Jabatan</label>
                        <select x-model="form.posisi" class="w-full v3-input rounded-2xl px-4 py-3 text-sm font-semibold outline-none appearance-none">
                            <option value="Teknisi">Teknisi</option>
                            <option value="Admin">Admin</option>
                            <option value="Frontliner">CS</option>
                            <option value="Kepala Cabang">KACAB</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-700 ml-1">Status</label>
                        <select x-model="form.status" class="w-full v3-input rounded-2xl px-4 py-3 text-sm font-semibold outline-none appearance-none">
                            <option value="Aktif">Aktif</option>
                            <option value="non aktif">Non Aktif</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 ml-1">Outlet</label>
                    <input type="text" x-model="form.outlet" required class="w-full v3-input rounded-2xl px-5 py-3 text-sm font-semibold outline-none">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 ml-1">Spesialisasi</label>
                    <select x-model="form.job" class="w-full v3-input rounded-2xl px-4 py-3 text-sm font-semibold outline-none appearance-none">
                        <option value="Mesin">Mesin</option>
                        <option value="Interface">Interface</option>
                        <option value="Software">Software</option>
                        <option value="Aksesoris">Aksesoris</option>
                        <option value="General">General</option>
                    </select>
                </div>

                <div class="flex justify-end gap-3 pt-6">
                    <button type="button" @click="showModal = false" class="px-6 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">Batal</button>
                    <button type="submit" class="btn-primary px-8 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-200" :disabled="loading">
                        <span x-text="loading ? 'Memproses...' : 'Simpan Data'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Logika JS tetap sama dengan fungsionalitas yang Anda miliki, hanya menyesuaikan beberapa field penamaan jika perlu.
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
            form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' },

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; },
            get startRange() { return this.staffs.length === 0 ? 0 : (this.currentPage - 1) * this.rowsPerPage + 1; },
            get endRange() { return Math.min(this.currentPage * this.rowsPerPage, this.staffs.length); },

            async call(payload) {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    console.error(err); return null;
                } finally { this.loading = false; }
            },

            async getStaff() {
                const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                if (res && res.data) {
                    this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    this.currentPage = 1;
                }
            },

            openModal(mode, item = null) {
                this.mode = mode; this.showModal = true;
                if (mode === 'edit' && item) {
                    this.form = {
                        Id: item.id || item.Id, nama: item.nama || item.Nama,
                        outlet: item.outlet || item.Outlet, posisi: item.posisi || item.Posisi,
                        status: item.status || item.Status, job: item.job || item.Job
                    };
                } else {
                    this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' };
                }
            },

            async saveStaff() {
                const payload = { ...this.form, id: this.form.Id || 0, shiff: "Siang" };
                const res = await this.call({ method: 'path', table: 'staff', params: [payload] });
                if (res) {
                    await this.getStaff();
                    this.showModal = false;
                }
            },

            async deleteStaff(id) {
                if (!confirm('Hapus data ini?')) return;
                const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                if (res) await this.getStaff();
            }
        }
    }
</script>
</body>
</html>
