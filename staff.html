<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management v1 - Responsive Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #020617; color: #ecfdf5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .neon-text { color: #10b981; text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        .sidebar-link { transition: all 0.3s; border-left: 3px solid transparent; }
        .sidebar-link.active { background: rgba(16, 185, 129, 0.1); border-left-color: #10b981; color: #10b981; }
        .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(16, 185, 129, 0.2); color: #f0fdf4; }
    </style>
</head>
<body class="flex min-h-screen overflow-x-hidden" x-data="staffManager()" x-init="getStaff()">

    <div x-show="isSidebarOpen" 
         @click="isSidebarOpen = false" 
         class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[60] md:hidden"
         x-transition:enter="transition opacity ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:leave="transition opacity ease-in duration-200"
         x-cloak></div>

    <aside class="fixed inset-y-0 left-0 w-64 glass border-r border-emerald-500/10 flex flex-col z-[70] transform transition-transform duration-300 md:relative md:translate-x-0"
           :class="isSidebarOpen ? 'translate-x-0' : '-translate-x-full'">
        
        <div class="p-6 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-black neon-text uppercase tracking-tighter italic">Cyber<span class="text-sky-400">Staff</span></h2>
                <p class="text-[8px] text-emerald-500/40 font-mono tracking-[0.3em] uppercase">v1.0.4</p>
            </div>
            <button @click="isSidebarOpen = false" class="md:hidden text-emerald-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg>
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="sidebar-link active flex items-center gap-4 px-4 py-3 rounded-r-xl text-[10px] font-black uppercase tracking-widest">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"></path></svg>
                Monitoring
            </a>
            <a href="#" class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-r-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-emerald-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5" stroke-width="2"></path></svg>
                Outlets
            </a>
            <a href="#" class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-r-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-emerald-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="2"></path></svg>
                Settings
            </a>
        </nav>

        <div class="p-6 border-t border-emerald-500/10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-slate-950 font-black text-[10px]">AD</div>
                <div class="overflow-hidden">
                    <p class="text-[10px] font-bold text-emerald-50 truncate">Admin Madiun</p>
                    <p class="text-[8px] text-emerald-500/50 uppercase">Superuser</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        
        <header class="h-16 glass border-b border-emerald-500/10 flex items-center justify-between px-6 sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <button @click="isSidebarOpen = true" class="md:hidden text-emerald-500 p-2 hover:bg-emerald-500/10 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"></path></svg>
                </button>
                <h1 class="text-xs font-black uppercase tracking-[0.2em] text-white/70 hidden sm:block">Dashboard / <span class="text-emerald-500">Staff List</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-xl border border-emerald-500/10">
                    <span class="text-[9px] text-emerald-500/40 font-black uppercase tracking-tighter">Rows:</span>
                    <select x-model="rowsPerPage" @change="currentPage = 1" class="bg-transparent text-[10px] text-emerald-400 outline-none font-bold cursor-pointer">
                        <option value="10" class="bg-slate-900">10</option>
                        <option value="25" class="bg-slate-900">25</option>
                    </select>
                </div>
                <button @click="getStaff()" class="p-2 hover:bg-emerald-500/10 text-emerald-500 rounded-lg transition-all group">
                    <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5"></path></svg>
                </button>
            </div>
        </header>

        <main class="p-4 md:p-8 flex-1">
            <div class="glass rounded-3xl overflow-hidden shadow-2xl border border-emerald-500/10">
                <div class="overflow-x-auto">
                    <table class="w-full text-left table-fixed border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-slate-900/60 text-sky-200/40 text-[10px] uppercase font-black tracking-[0.2em] border-b border-emerald-500/10">
                                <th class="px-8 py-6 w-[30%]">Staff Nodes</th>
                                <th class="px-8 py-6 w-[20%]">Outlet</th>
                                <th class="px-8 py-6 w-[15%] text-center">Shift</th>
                                <th class="px-8 py-6 w-[15%] text-center">Status</th>
                                <th class="px-8 py-6 w-[20%] text-right">
                                    <button @click="openModal('add')" class="bg-emerald-600 hover:bg-emerald-500 text-slate-950 px-4 py-2 rounded-xl text-[9px] font-black tracking-widest transition-all shadow-[0_0_15px_rgba(16,185,129,0.2)]">ADD NEW</button>
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-emerald-500/5">
                            <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                                <tr class="hover:bg-emerald-500/[0.03] transition-all group">
                                    <td class="px-8 py-5">
                                        <div class="flex items-center gap-4">
                                            <span class="text-sky-500 font-mono text-[10px] opacity-40" x-text="item.id || item.Id"></span>
                                            <div>
                                                <div class="font-bold text-emerald-50 text-sm" x-text="item.nama || item.Nama"></div>
                                                <div class="text-[9px] text-emerald-500/60 uppercase font-black" x-text="item.posisi || item.Posisi"></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="px-8 py-5 text-slate-500 text-xs truncate" x-text="item.outlet || item.Outlet"></td>
                                    <td class="px-8 py-5 text-center">
                                        <span class="px-3 py-1 rounded-full text-[8px] font-black border uppercase tracking-widest"
                                              :class="{
                                                'bg-sky-500/10 text-sky-400 border-sky-500/20': (item.shiff || item.Shiff) === 'Pagi',
                                                'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': (item.shiff || item.Shiff) === 'Siang',
                                                'bg-indigo-500/10 text-indigo-400 border-indigo-500/20': (item.shiff || item.Shiff) === 'Malam'
                                              }" x-text="item.shiff || item.Shiff || '-'"></span>
                                    </td>
                                    <td class="px-8 py-5 text-center">
                                        <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase border" 
                                              :class="(item.status || item.Status) === 'Aktif' ? 'bg-emerald-500 text-slate-950 border-emerald-400' : 'bg-transparent text-slate-700 border-slate-800'"
                                              x-text="item.status || item.Status"></span>
                                    </td>
                                    <td class="px-8 py-5 text-right">
                                        <div class="flex justify-end gap-1.5 opacity-0 group-hover:opacity-100 transition-all">
                                            <button @click="openModal('edit', item)" class="p-2 hover:bg-sky-500/10 text-sky-400 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2"></path></svg></button>
                                            <button @click="deleteStaff(item.id || item.Id)" class="p-2 hover:bg-red-500/10 text-red-400 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"></path></svg></button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <div class="px-8 py-6 border-t border-emerald-500/10 bg-slate-900/40 flex flex-col sm:flex-row justify-between items-center gap-6">
                    <p class="text-[9px] font-mono font-black text-emerald-500/40 uppercase tracking-widest">
                        Node Counter: <span x-text="staffs.length" class="text-sky-400"></span> Objects Sync
                    </p>
                    <div class="flex items-center gap-1.5">
                        <button @click="currentPage--" :disabled="currentPage === 1" class="w-9 h-9 flex items-center justify-center rounded-xl glass border-emerald-500/20 text-emerald-500 disabled:opacity-10">&larr;</button>
                        <template x-for="p in totalPages" :key="p">
                            <button @click="currentPage = p" 
                                    class="w-9 h-9 rounded-xl text-[9px] font-black transition-all border"
                                    :class="currentPage === p ? 'bg-emerald-500 text-slate-950 border-emerald-400' : 'glass border-white/5 text-slate-500 hover:text-emerald-400'"
                                    x-text="p"></button>
                        </template>
                        <button @click="currentPage++" :disabled="currentPage === totalPages" class="w-9 h-9 flex items-center justify-center rounded-xl glass border-emerald-500/20 text-emerald-500 disabled:opacity-10">&rarr;</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md" x-transition x-cloak>
        <div class="glass w-full max-w-md rounded-3xl overflow-hidden border-emerald-500/30">
            <div class="p-6 border-b border-emerald-500/10 flex justify-between items-center bg-emerald-950/20">
                <h3 class="text-[10px] font-black neon-text uppercase tracking-widest" x-text="mode === 'edit' ? 'Update Protocol' : 'New Registration'"></h3>
                <button @click="showModal = false" class="text-emerald-500 text-2xl transition-colors">&times;</button>
            </div>
            <form @submit.prevent="saveStaff" class="p-8 space-y-4">
                <div>
                    <label class="block text-[9px] uppercase font-black text-emerald-400/50 mb-1">Full Name</label>
                    <input type="text" x-model="form.nama" required class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] uppercase font-black text-emerald-400/50 mb-1">Position</label>
                        <select x-model="form.posisi" class="w-full input-dark rounded-xl px-3 py-2 text-[10px] font-bold uppercase">
                            <option value="Teknisi">Teknisi</option>
                            <option value="Admin">Admin</option>
                            <option value="Frontliner">CS</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] uppercase font-black text-emerald-400/50 mb-1">Shift</label>
                        <select x-model="form.shiff" class="w-full input-dark rounded-xl px-3 py-2 text-[10px] font-bold uppercase">
                            <option value="Pagi">Pagi</option>
                            <option value="Siang">Siang</option>
                            <option value="Malam">Malam</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-black text-emerald-400/50 mb-1">Location</label>
                    <input type="text" x-model="form.outlet" required class="w-full input-dark rounded-xl px-4 py-3 text-sm font-bold">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl text-[10px] font-black text-slate-950 uppercase tracking-[0.2em] transition-all">
                    <span x-text="loading ? 'PROCESSING...' : 'SAVE CHANGES'"></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function staffManager() {
            return {
                url: 'https://job.hitungnota.com/api',
                loading: false, showModal: false, isSidebarOpen: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
                form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Pagi' },

                get pagedStaffs() {
                    const start = (this.currentPage - 1) * this.rowsPerPage;
                    return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
                },
                get totalPages() { return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; },

                async call(payload) {
                    this.loading = true;
                    try {
                        const response = await fetch(this.url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        return await response.json();
                    } catch (err) { alert('Err: ' + err.message); return null; } finally { this.loading = false; }
                },

                async getStaff() {
                    const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                    if (res && res.data) { this.staffs = Array.isArray(res.data) ? res.data : [res.data]; }
                },

                openModal(mode, item = null) {
                    this.mode = mode; this.showModal = true;
                    if (mode === 'edit' && item) {
                        this.form = {
                            Id: item.id || item.Id, nama: item.nama || item.Nama, outlet: item.outlet || item.Outlet,
                            posisi: item.posisi || item.Posisi, status: item.status || item.Status,
                            job: item.job || item.Job, shiff: item.shiff || item.Shiff || 'Pagi'
                        };
                    } else {
                        this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Pagi' };
                    }
                },

                async saveStaff() {
                    const payload = { ...this.form, id: this.form.Id || 0 };
                    const res = await this.call({ method: 'path', table: 'staff', params: [payload] });
                    if (res) { await this.getStaff(); this.showModal = false; }
                },

                async deleteStaff(id) {
                    if (!confirm('Hapus?')) return;
                    const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                    if (res) await this.getStaff();
                }
            }
        }
    </script>
</body>
</html>
