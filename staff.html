<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff v1 - Hybrid Nav</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #020617; color: #ecfdf5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .neon-text { color: #10b981; text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        
        /* Desktop Sidebar Style */
        .sidebar-link { transition: all 0.3s; border-left: 3px solid transparent; }
        .sidebar-link.active { background: rgba(16, 185, 129, 0.1); border-left-color: #10b981; color: #10b981; }

        /* Mobile Bottom Nav Style */
        .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .mobile-nav-item.active { color: #10b981; }

        .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(16, 185, 129, 0.2); color: #f0fdf4; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen" x-data="staffManager()" x-init="getStaff()">

    <aside class="hidden md:flex w-64 glass border-r border-emerald-500/10 flex-col sticky top-0 h-screen">
        <div class="p-8">
            <h2 class="text-xl font-black neon-text uppercase tracking-tighter italic">Cyber<span class="text-sky-400">Staff</span></h2>
            <p class="text-[8px] text-emerald-500/40 font-mono tracking-[0.3em] mt-1">SYSTEM V1.0</p>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="sidebar-link active flex items-center gap-4 px-4 py-3 rounded-r-xl text-[10px] font-black uppercase tracking-widest">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2.5"></path></svg> Monitoring
            </a>
            <a href="#" class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-r-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5" stroke-width="2"></path></svg> Outlets
            </a>
            <a href="#" class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-r-xl text-[10px] font-black uppercase tracking-widest text-slate-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" stroke-width="2"></path></svg> Settings
            </a>
        </nav>
        <div class="p-6 border-t border-emerald-500/10 opacity-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-emerald-500/20 border border-emerald-500/40"></div>
                <div class="text-[9px] font-black uppercase tracking-tighter">Root_Admin</div>
            </div>
        </div>
    </aside>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 glass border-t border-emerald-500/20 flex z-[100] px-2 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <a href="#" class="mobile-nav-item active">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2.5"></path></svg>
            <span>Monitor</span>
        </a>
        <a href="#" class="mobile-nav-item text-slate-500">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16" stroke-width="2"></path></svg>
            <span>Outlet</span>
        </a>
        <button @click="openModal('add')" class="flex-none -translate-y-4">
            <div class="w-14 h-14 bg-emerald-600 rounded-full flex items-center justify-center text-slate-950 shadow-lg shadow-emerald-500/40 border-4 border-slate-950">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="4"></path></svg>
            </div>
        </button>
        <a href="#" class="mobile-nav-item text-slate-500">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6" stroke-width="2"></path></svg>
            <span>Stats</span>
        </a>
        <a href="#" class="mobile-nav-item text-slate-500">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4" stroke-width="2"></path></svg>
            <span>System</span>
        </a>
    </nav>

    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg md:text-2xl font-black text-white uppercase tracking-tighter">Staff Nodes</h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-[9px] text-emerald-500/60 font-mono uppercase tracking-widest">Database Linked</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button @click="getStaff()" class="p-2.5 glass hover:bg-emerald-500/10 rounded-xl transition-all border-emerald-500/20 group">
                    <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9" stroke-width="2.5"></path></svg>
                </button>
                <button @click="openModal('add')" class="hidden md:flex bg-emerald-600 hover:bg-emerald-500 text-slate-950 px-5 py-2.5 rounded-xl text-[10px] font-black transition-all shadow-lg shadow-emerald-500/20 items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="4"></path></svg>
                    NEW REGISTRATION
                </button>
            </div>
        </div>

        <div class="glass rounded-3xl shadow-2xl overflow-hidden border border-emerald-500/10">
            <div class="overflow-x-auto">
                <table class="w-full text-left table-fixed border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-900/60 text-sky-200/40 text-[9px] uppercase font-black tracking-[0.2em] border-b border-emerald-500/10">
                            <th class="px-8 py-5 w-[30%]">Full Identity</th>
                            <th class="px-8 py-5 w-[25%]">Assigned Outlet</th>
                            <th class="px-8 py-5 w-[15%] text-center">Status</th>
                            <th class="px-8 py-5 w-[15%] text-center">Shift</th>
                            <th class="px-8 py-5 w-[15%] text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-emerald-500/5">
                        <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                            <tr class="hover:bg-emerald-500/[0.03] transition-all group">
                                <td class="px-8 py-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-2 h-8 bg-emerald-500/10 rounded-full group-hover:bg-emerald-500/40 transition-all"></div>
                                        <div>
                                            <div class="font-bold text-emerald-50 text-sm" x-text="item.nama || item.Nama"></div>
                                            <div class="text-[9px] text-emerald-500/60 uppercase font-black" x-text="item.posisi || item.Posisi"></div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-8 py-4 text-slate-500 text-xs font-medium" x-text="item.outlet || item.Outlet"></td>
                                <td class="px-8 py-4 text-center">
                                    <span class="px-2.5 py-0.5 rounded text-[8px] font-black uppercase border" 
                                          :class="(item.status || item.Status) === 'Aktif' ? 'bg-emerald-500 text-slate-950 border-emerald-400' : 'bg-transparent text-slate-700 border-slate-800'"
                                          x-text="item.status || item.Status"></span>
                                </td>
                                <td class="px-8 py-4 text-center">
                                    <span class="text-[9px] font-black text-sky-400 uppercase tracking-tighter" x-text="item.shiff || '-'"></span>
                                </td>
                                <td class="px-8 py-4 text-right">
                                    <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                        <button @click="openModal('edit', item)" class="p-2 hover:bg-sky-500/10 text-sky-400 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15" stroke-width="2"></path></svg></button>
                                        <button @click="deleteStaff(item.id || item.Id)" class="p-2 hover:bg-red-500/10 text-red-400 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7" stroke-width="2"></path></svg></button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <div class="px-8 py-6 border-t border-emerald-500/10 bg-slate-900/40 flex flex-col sm:flex-row justify-between items-center gap-6">
                <p class="text-[9px] font-mono font-black text-emerald-500/30 uppercase tracking-[0.3em]">
                    Total <span x-text="staffs.length" class="text-white"></span> Records Detected
                </p>
                <div class="flex items-center gap-1.5">
                    <button @click="currentPage--" :disabled="currentPage === 1" class="w-10 h-10 flex items-center justify-center rounded-xl glass border-emerald-500/20 text-emerald-500 disabled:opacity-10">&larr;</button>
                    <div class="flex gap-1">
                        <template x-for="p in totalPages" :key="p">
                            <button @click="currentPage = p" 
                                    class="w-10 h-10 rounded-xl text-[9px] font-black transition-all border"
                                    :class="currentPage === p ? 'bg-emerald-500 text-slate-950 border-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'glass border-white/5 text-slate-500'"
                                    x-text="p"></button>
                        </template>
                    </div>
                    <button @click="currentPage++" :disabled="currentPage === totalPages" class="w-10 h-10 flex items-center justify-center rounded-xl glass border-emerald-500/20 text-emerald-500 disabled:opacity-10">&rarr;</button>
                </div>
            </div>
        </div>
    </main>

    <div x-show="showModal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl" x-transition x-cloak>
        <div class="glass w-full max-w-md rounded-[2.5rem] overflow-hidden border-emerald-500/20">
            <div class="p-6 border-b border-emerald-500/10 flex justify-between items-center bg-emerald-950/20">
                <h3 class="text-[10px] font-black neon-text uppercase tracking-widest" x-text="mode === 'edit' ? 'Update Entry' : 'Register New Staff'"></h3>
                <button @click="showModal = false" class="text-emerald-500 text-3xl">&times;</button>
            </div>
            <form @submit.prevent="saveStaff" class="p-8 space-y-5">
                <input type="text" x-model="form.nama" placeholder="Full Name" required class="w-full input-dark rounded-2xl px-5 py-4 text-sm font-bold">
                <div class="grid grid-cols-2 gap-4">
                    <select x-model="form.posisi" class="w-full input-dark rounded-2xl px-4 py-3 text-xs font-bold uppercase">
                        <option value="Teknisi">Teknisi</option>
                        <option value="Admin">Admin</option>
                        <option value="Frontliner">CS</option>
                    </select>
                    <select x-model="form.shiff" class="w-full input-dark rounded-2xl px-4 py-3 text-xs font-bold uppercase">
                        <option value="Pagi">Pagi</option>
                        <option value="Siang">Siang</option>
                        <option value="Malam">Malam</option>
                    </select>
                </div>
                <input type="text" x-model="form.outlet" placeholder="Outlet Location" required class="w-full input-dark rounded-2xl px-5 py-4 text-sm font-bold">
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl text-[11px] font-black text-slate-950 uppercase tracking-[0.2em] transition-all">
                    <span x-text="loading ? 'SYNCING...' : 'COMMIT DATABASE'"></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function staffManager() {
            return {
                url: 'https://job.hitungnota.com/api',
                loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
                form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Pagi' },

                get pagedStaffs() {
                    const start = (this.currentPage - 1) * this.rowsPerPage;
                    return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
                },
                get totalPages() { return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; },

                async call(payload) {
                    this.loading = true;
                    try {
                        const response = await fetch(this.url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        return await response.json();
                    } catch (err) { alert('Err: ' + err.message); return null; } finally { this.loading = false; }
                },

                async getStaff() {
                    const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                    if (res && res.data) { this.staffs = Array.isArray(res.data) ? res.data : [res.data]; }
                },

                openModal(mode, item = null) {
                    this.mode = mode; this.showModal = true;
                    if (mode === 'edit' && item) {
                        this.form = {
                            Id: item.id || item.Id, nama: item.nama || item.Nama, outlet: item.outlet || item.Outlet,
                            posisi: item.posisi || item.Posisi, status: item.status || item.Status,
                            job: item.job || item.Job, shiff: item.shiff || item.Shiff || 'Pagi'
                        };
                    } else {
                        this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Pagi' };
                    }
                },

                async saveStaff() {
                    const payload = { ...this.form, id: this.form.Id || 0 };
                    const res = await this.call({ method: 'path', table: 'staff', params: [payload] });
                    if (res) { await this.getStaff(); this.showModal = false; }
                },

                async deleteStaff(id) {
                    if (!confirm('Hapus?')) return;
                    const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                    if (res) await this.getStaff();
                }
            }
        }
    </script>
</body>
</html>
