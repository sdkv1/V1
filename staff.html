<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE CHAIN - Orange White Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #ffffff; 
            color: #1e293b; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #fff7ed 0%, #ffffff 80%);
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(249, 115, 22, 0.1);
        }
        .neon-text-orange { color: #f97316; text-shadow: 0 0 12px rgba(249, 115, 22, 0.2); }
        .font-mono { font-family: 'Fira Code', monospace; }
        .bg-grid { background-size: 30px 30px; background-image: linear-gradient(to right, rgba(249, 115, 22, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(249, 115, 22, 0.03) 1px, transparent 1px); }
    </style>
</head>
<body class="p-4 lg:p-8">

<div class="max-w-[1400px] mx-auto w-full" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div class="text-center md:text-left">
            <h2 class="text-2xl font-black neon-text uppercase tracking-tighter">Staff Monitoring <span class="text-white">v1</span></h2>
            <p class="text-[10px] text-slate-500 font-mono mt-1">> SYSTEM_READY: <span x-text="staffs.length"></span> NODES FOUND</p>
        </div>
        
        <div class="flex flex-wrap justify-center gap-3 w-full md:w-auto">
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-2 rounded-xl border border-white/5 shadow-inner">
                <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Rows per page:</span>
                <select x-model="rowsPerPage" @change="currentPage = 1" class="bg-transparent text-xs text-green-400 outline-none font-bold cursor-pointer">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>

            <button @click="getStaff()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all shadow-xl" :disabled="loading">
                <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            
            <button @click="openModal('add')" class="px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-black rounded-xl transition-all shadow-lg shadow-green-900/30 text-xs tracking-widest uppercase">
                + Tambah Staff
            </button>
        </div>
    </div>

    <div class="glass rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
        
        <div class="hidden md:block">
            <table class="w-full text-left table-fixed border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                        <th class="px-8 py-5 w-[30%]">Staff Identity</th>
                        <th class="px-8 py-5 w-[35%]">Outlet</th>
                        <th class="px-8 py-5 w-[20%] text-center">Status & Job</th>
                        <th class="px-8 py-5 w-[15%] text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-white/[0.04] transition-all">
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-4">
                                    <span class="text-green-500 font-mono text-[10px] w-6" x-text="item.id || item.Id"></span>
                                    <div class="min-w-0">
                                        <div class="font-bold text-slate-100 text-sm truncate" x-text="item.nama || item.Nama"></div>
                                        <div class="text-[9px] text-slate-500 uppercase font-black" x-text="item.posisi || item.Posisi"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-5">
                                <div class="text-slate-300 text-xs truncate" x-text="item.outlet || item.Outlet"></div>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase border" 
                                          :class="(item.status || item.Status) === 'Aktif' ? 'bg-green-500/10 text-green-400 border-green-500/20' : 'bg-slate-700/50 text-slate-500 border-white/5'"
                                          x-text="item.status || item.Status"></span>
                                    <span class="text-[9px] text-blue-400 font-mono font-bold" x-text="item.job || item.Job"></span>
                                </div>
                            </td>
                            <td class="px-8 py-5 text-right relative" x-data="{ menuOpen: false }">
                                <button @click="menuOpen = !menuOpen" @click.away="menuOpen = false" class="p-2 hover:bg-slate-700/50 rounded-lg transition-colors">
                                    <svg class="w-5 h-5 text-slate-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                                </button>
                                <div x-show="menuOpen" x-cloak class="absolute right-12 top-12 w-28 glass border border-white/20 rounded-xl shadow-2xl z-50 overflow-hidden shadow-black">
                                    <button @click="openModal('edit', item); menuOpen = false" class="w-full text-left px-4 py-2.5 text-[10px] font-black text-blue-400 hover:bg-blue-500/10 border-b border-white/5 uppercase">Edit</button>
                                    <button @click="deleteStaff(item.id || item.Id); menuOpen = false" class="w-full text-left px-4 py-2.5 text-[10px] font-black text-red-400 hover:bg-red-500/10 uppercase">Hapus</button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="block md:hidden divide-y divide-white/5">
            <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                <div class="p-5">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex gap-3 min-w-0">
                            <div class="w-9 h-9 rounded-lg bg-slate-800 border border-white/10 flex items-center justify-center shrink-0">
                                <span class="text-[10px] font-mono text-green-500 font-bold" x-text="item.id || item.Id"></span>
                            </div>
                            <div class="min-w-0">
                                <h4 class="font-bold text-slate-100 text-sm truncate" x-text="item.nama || item.Nama"></h4>
                                <p class="text-[9px] text-slate-500 uppercase font-black" x-text="item.posisi || item.Posisi"></p>
                            </div>
                        </div>
                        <div x-data="{ mOpen: false }" class="relative">
                            <button @click="mOpen = !mOpen" @click.away="mOpen = false" class="p-2">
                                <svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                            </button>
                            <div x-show="mOpen" x-cloak class="absolute right-0 top-8 w-28 glass border border-white/20 rounded-xl shadow-2xl z-50 overflow-hidden shadow-black">
                                <button @click="openModal('edit', item); mOpen = false" class="w-full text-left px-4 py-3 text-[10px] font-bold text-blue-400 hover:bg-blue-400/10 border-b border-white/5 uppercase">Edit</button>
                                <button @click="deleteStaff(item.id || item.Id); mOpen = false" class="w-full text-left px-4 py-3 text-[10px] font-bold text-red-400 hover:bg-red-400/10 uppercase">Hapus</button>
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-900/40 rounded-xl p-3 border border-white/5 flex justify-between items-center text-[10px]">
                        <span class="text-slate-500 truncate mr-4 max-w-[60%]" x-text="item.outlet || item.Outlet"></span>
                        <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase border shrink-0" 
                              :class="(item.status || item.Status) === 'Aktif' ? 'bg-green-500/10 text-green-400 border-green-500/20' : 'bg-slate-700/50 text-slate-500 border-white/5'"
                              x-text="item.status || item.Status"></span>
                    </div>
                </div>
            </template>
        </div>

        <div class="px-6 py-4 border-t border-white/5 bg-slate-900/40 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-[10px] font-mono text-slate-500 uppercase tracking-widest font-black">
                Showing <span class="text-green-500" x-text="startRange"></span> - <span class="text-green-500" x-text="endRange"></span> 
                of <span class="text-white" x-text="staffs.length"></span>
            </div>

            <div class="flex items-center gap-1">
                <button @click="currentPage = 1" :disabled="currentPage === 1" class="p-2 hover:text-white text-slate-600 disabled:opacity-0 transition-all">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"></path><path d="M16.707 5.293a1 1 0 010 1.414L13.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"></path></svg>
                </button>
                
                <button @click="currentPage--" :disabled="currentPage === 1" class="w-9 h-9 flex items-center justify-center bg-slate-800 rounded-lg border border-slate-700 disabled:opacity-20 hover:bg-slate-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>

                <div class="flex items-center px-4 font-mono text-xs">
                    <span class="text-white font-bold" x-text="currentPage"></span>
                    <span class="text-slate-600 mx-2">/</span>
                    <span class="text-slate-400" x-text="totalPages"></span>
                </div>

                <button @click="currentPage++" :disabled="currentPage === totalPages" class="w-9 h-9 flex items-center justify-center bg-slate-800 rounded-lg border border-slate-700 disabled:opacity-20 hover:bg-slate-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <button @click="currentPage = totalPages" :disabled="currentPage === totalPages" class="p-2 hover:text-white text-slate-600 disabled:opacity-0 transition-all">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"></path><path d="M3.293 14.707a1 1 0 010-1.414L6.586 10 3.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"></path></svg>
                </button>
            </div>
        </div>
    </div>
    
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md" x-transition x-cloak>
        <div class="glass w-full max-w-md rounded-3xl shadow-2xl overflow-hidden shadow-black">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                <h3 class="text-sm font-black neon-text uppercase tracking-widest" x-text="mode === 'edit' ? 'Edit Staff Node' : 'Register New Node'"></h3>
                <button @click="showModal = false" class="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-slate-400">&times;</button>
            </div>
            <form @submit.prevent="saveStaff" class="p-6 space-y-4">
                <div>
                    <label class="block text-[9px] uppercase font-black text-slate-500 mb-1">Full Name</label>
                    <input type="text" x-model="form.nama" required class="w-full input-dark rounded-xl px-4 py-2.5 text-sm font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] uppercase font-black text-slate-500 mb-1">Position</label>
                        <select x-model="form.posisi" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-bold uppercase">
                            <option value="Teknisi">Teknisi</option>
                            <option value="Admin">Admin</option>
                            <option value="Frontliner">Cs</option>
                            <option value="Kepala Cabang">KACAB</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] uppercase font-black text-slate-500 mb-1">Status</label>
                        <select x-model="form.status" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-bold uppercase">
                            <option value="Aktif">Aktif</option>
                            <option value="non aktif">Non Aktif</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-black text-slate-500 mb-1">Outlet Context</label>
                    <input type="text" x-model="form.outlet" required class="w-full input-dark rounded-xl px-4 py-2.5 text-sm font-bold">
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-black text-slate-500 mb-1">Specialization</label>
                    <select x-model="form.job" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-bold uppercase">
                        <option value="Mesin">Mesin</option>
                        <option value="Interface">Interface</option>
                        <option value="Software">Software</option>
                        <option value="Aksesoris">Aksesori</option>
                        <option value="General">General</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" @click="showModal = false" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cancel</button>
                    <button type="submit" class="bg-green-600 hover:bg-green-500 px-8 py-2.5 rounded-xl text-[10px] font-black text-white uppercase tracking-widest shadow-lg shadow-green-900/40" :disabled="loading">
                        <span x-text="loading ? 'Processing...' : 'Save Record'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
            form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' },

            // Logic Paging
            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { 
                return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; 
            },
            get startRange() {
                return this.staffs.length === 0 ? 0 : (this.currentPage - 1) * this.rowsPerPage + 1;
            },
            get endRange() {
                return Math.min(this.currentPage * this.rowsPerPage, this.staffs.length);
            },

            async call(payload) {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    alert('Network Error: ' + err.message); return null;
                } finally { this.loading = false; }
            },

            async getStaff() {
                const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                if (res && res.data) {
                    this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    this.currentPage = 1; // Reset ke hal 1 setiap refresh data
                }
            },

            openModal(mode, item = null) {
                this.mode = mode; this.showModal = true;
                if (mode === 'edit' && item) {
                    this.form = {
                        Id: item.id || item.Id, nama: item.nama || item.Nama,
                        outlet: item.outlet || item.Outlet, posisi: item.posisi || item.Posisi,
                        status: item.status || item.Status, job: item.job || item.Job
                    };
                } else {
                    this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin' };
                }
            },

            async saveStaff() {
    const payload = { ...this.form, id: this.form.Id || 0, shiff: "Siang" };

    const res = await this.call({
        method: 'path', 
        table: 'staff',
        params: [payload]
    });

    if (res) {
        if (this.form.Id) {
            // Update data yang sudah ada
            this.staffs = res.data
            const index = this.staffs.findIndex(s => s.Id == this.form.Id);
            if (index !== -1) {
                // Menggunakan splice agar Alpine.js mendeteksi perubahan
                this.staffs.splice(index, 1, { ...payload });
            }
        } else {
            // Tambah data baru ke baris paling atas
            // Pastikan 'res' berisi ID baru dari server jika ada
            const newEntry = { ...payload, Id: res.id || Date.now() };
            this.staffs = [newEntry, ...this.staffs];
        }

        this.showModal = false;
        this.form = {}; // Reset form
       }
    },

            async deleteStaff(id) {
                if (!confirm('Hapus data ini dari sistem?')) return;
                const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                if (res) await this.getStaff();
            }
        }
    }
</script>

</body>
</html>
