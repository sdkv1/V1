<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff KPI v1 - Profiling Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        
        /* Glow Effects */
        .glow-mesin { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .glow-interface { box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="p-4 lg:p-8">

<div class="max-w-[1400px] mx-auto w-full" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div>
            <h2 class="text-2xl font-black neon-text uppercase tracking-tighter italic">KPI Monitoring <span class="text-white">v1</span></h2>
            <p class="text-[10px] text-slate-500 font-mono mt-1">> STATUS: ONLINE | <span x-text="staffs.length"></span> NODES</p>
        </div>
        
        <div class="flex gap-3">
            <button @click="getStaff()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all" :disabled="loading">
                <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <div class="glass rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left table-fixed min-w-[850px] border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                        <th class="px-8 py-5 w-[100px]">Node</th>
                        <th class="px-4 py-5 w-[25%]">Full Name</th>
                        <th class="px-8 py-5 w-[15%] text-center">Shiff</th>
                        <th class="px-8 py-5 w-[20%]">Position</th>
                        <th class="px-8 py-5 w-[25%] text-center">Specialization</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-white/[0.04] transition-all group">
                            <td class="px-8 py-5">
                                <div class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all duration-300 border"
                                     :class="{
                                         'bg-green-500/20 border-green-500/40 glow-mesin': (item.job || item.Job) === 'Mesin',
                                         'bg-orange-500/20 border-orange-500/40 glow-interface': (item.job || item.Job) === 'Interface',
                                         'bg-slate-800 border-slate-700': (item.job || item.Job) !== 'Mesin' && (item.job || item.Job) !== 'Interface'
                                     }">
                                    <svg class="w-6 h-6 transition-colors" 
                                         :class="{
                                             'text-green-400': (item.job || item.Job) === 'Mesin',
                                             'text-orange-400': (item.job || item.Job) === 'Interface',
                                             'text-slate-500': (item.job || item.Job) !== 'Mesin' && (item.job || item.Job) !== 'Interface'
                                         }"
                                         fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                    </svg>
                                </div>
                            </td>
                            
                            <td class="px-4 py-5">
                                <div class="font-bold text-slate-100 text-sm tracking-tight" x-text="item.nama || item.Nama"></div>
                                <div class="text-[9px] text-slate-600 font-mono italic" x-text="'#UID-' + (item.id || item.Id)"></div>
                            </td>
                            
                            <td class="px-8 py-5 text-center">
                                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest bg-slate-800 px-3 py-1 rounded-md border border-white/5" 
                                      x-text="item.shiff || item.Shiff || 'N/A'"></span>
                            </td>
                            
                            <td class="px-8 py-5">
                                <span class="text-xs text-blue-400/80 font-semibold" x-text="item.posisi || item.Posisi"></span>
                            </td>
                            
                            <td class="px-8 py-5 text-center">
                                <span class="inline-block px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border"
                                      :class="{
                                          'bg-green-500/10 text-green-400 border-green-500/20': (item.job || item.Job) === 'Mesin',
                                          'bg-orange-500/10 text-orange-400 border-orange-500/20': (item.job || item.Job) === 'Interface',
                                          'bg-slate-800 text-slate-500 border-white/5': (item.job || item.Job) !== 'Interface' && (item.job || item.Job) !== 'Mesin'
                                      }"
                                      x-text="item.job || item.Job">
                                </span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="px-8 py-4 border-t border-white/5 bg-slate-900/60 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                    <span class="text-[9px] font-black text-slate-400 uppercase">Mesin Unit</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.5)]"></div>
                    <span class="text-[9px] font-black text-slate-400 uppercase">Interface Unit</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                 <button @click="currentPage--" :disabled="currentPage === 1" class="p-2 bg-slate-800 rounded-lg hover:text-white text-slate-500 disabled:opacity-0 transition-all border border-slate-700">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"></path></svg>
                </button>
                <div class="text-[10px] font-mono font-black text-green-500 bg-green-500/10 px-3 py-1 rounded-md border border-green-500/20">
                    PAGE <span x-text="currentPage"></span> / <span x-text="totalPages"></span>
                </div>
                <button @click="currentPage++" :disabled="currentPage === totalPages" class="p-2 bg-slate-800 rounded-lg hover:text-white text-slate-500 disabled:opacity-0 transition-all border border-slate-700">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, staffs: [], currentPage: 1, rowsPerPage: 10,

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { 
                return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; 
            },

            async getStaff() {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: 'fetch', table: 'staff', params: [24] })
                    });
                    const res = await response.json();
                    if (res && res.data) {
                        this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    }
                } catch (err) {
                    console.error('API Error:', err);
                } finally { this.loading = false; }
            }
        }
    }
</script>

</body>
</html>
