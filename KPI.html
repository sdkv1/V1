<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff KPI v1 - Profiling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="p-4 lg:p-8">

<div class="max-w-[1400px] mx-auto w-full" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div>
            <h2 class="text-2xl font-black neon-text uppercase tracking-tighter italic">KPI Monitoring <span class="text-white">v1</span></h2>
            <p class="text-[10px] text-slate-500 font-mono mt-1">> SYSTEM_LOAD: <span x-text="staffs.length"></span> NODES ACTIVE</p>
        </div>
        
        <button @click="getStaff()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all shadow-xl" :disabled="loading">
            <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <div class="glass rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left table-fixed min-w-[800px] border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                        <th class="px-8 py-5 w-[80px]">Profile</th>
                        <th class="px-4 py-5 w-[25%]">Nama Teknisi</th>
                        <th class="px-8 py-5 w-[15%]">Shiff</th>
                        <th class="px-8 py-5 w-[20%]">Posisi</th>
                        <th class="px-8 py-5 w-[25%] text-center">Job Specialization</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-white/[0.04] transition-all group">
                            <td class="px-8 py-5">
                                <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center group-hover:border-green-500/50 transition-colors overflow-hidden">
                                    <svg class="w-6 h-6 text-slate-500 group-hover:text-green-400" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                    </svg>
                                </div>
                            </td>
                            <td class="px-4 py-5">
                                <div class="font-bold text-slate-100 text-sm tracking-tight" x-text="item.nama || item.Nama"></div>
                                <div class="text-[9px] text-slate-600 font-mono" x-text="'NODE_ID: ' + (item.id || item.Id)"></div>
                            </td>
                            <td class="px-8 py-5">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-900/50 px-2 py-1 rounded" x-text="item.shiff || item.Shiff || 'SIANG'"></span>
                            </td>
                            <td class="px-8 py-5">
                                <span class="text-xs text-blue-400/80 font-medium" x-text="item.posisi || item.Posisi"></span>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <span class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter border shadow-sm"
                                      :class="{
                                          'bg-green-500/10 text-green-400 border-green-500/30': (item.job || item.Job) === 'Mesin',
                                          'bg-orange-500/10 text-orange-400 border-orange-500/30': (item.job || item.Job) === 'Interface',
                                          'bg-slate-800 text-slate-500 border-white/5': (item.job || item.Job) !== 'Interface' && (item.job || item.Job) !== 'Mesin'
                                      }"
                                      x-text="item.job || item.Job">
                                </span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="px-8 py-4 border-t border-white/5 bg-slate-900/40 flex justify-between items-center">
            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[9px] font-black text-slate-500 uppercase">Mesin: High Priority</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                    <span class="text-[9px] font-black text-slate-500 uppercase">Interface: Active</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                 <button @click="currentPage--" :disabled="currentPage === 1" class="text-slate-500 hover:text-white disabled:opacity-0 transition-all">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"></path></svg>
                </button>
                <span class="text-[10px] font-mono font-bold text-green-500" x-text="currentPage + ' / ' + totalPages"></span>
                <button @click="currentPage++" :disabled="currentPage === totalPages" class="text-slate-500 hover:text-white disabled:opacity-0 transition-all">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, staffs: [], currentPage: 1, rowsPerPage: 10,

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { 
                return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; 
            },

            async getStaff() {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: 'fetch', table: 'staff', params: [24] })
                    });
                    const res = await response.json();
                    if (res && res.data) {
                        this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    }
                } catch (err) {
                    console.error('Error:', err);
                } finally { this.loading = false; }
            }
        }
    }
</script>

</body>
</html>
