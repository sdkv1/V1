<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff KPI v1 - Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .input-dark {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body class="p-4 lg:p-8">

<div class="max-w-[1400px] mx-auto w-full" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div class="text-center md:text-left">
            <h2 class="text-2xl font-black neon-text uppercase tracking-tighter">KPI Teknisi <span class="text-white">v1</span></h2>
            <p class="text-[10px] text-slate-500 font-mono mt-1">> MONITORING_MODE: <span x-text="staffs.length"></span> NODES ACTIVE</p>
        </div>
        
        <div class="flex flex-wrap justify-center gap-3 w-full md:w-auto">
            <div class="flex items-center gap-2 bg-slate-800/50 px-3 py-2 rounded-xl border border-white/5 shadow-inner">
                <span class="text-[9px] text-slate-500 font-black uppercase tracking-widest">Rows:</span>
                <select x-model="rowsPerPage" @change="currentPage = 1" class="bg-transparent text-xs text-green-400 outline-none font-bold cursor-pointer">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                </select>
            </div>

            <button @click="getStaff()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all shadow-xl" :disabled="loading">
                <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <div class="glass rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left table-fixed min-w-[700px] border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                        <th class="px-8 py-5 w-[10%]">ID</th>
                        <th class="px-8 py-5 w-[30%]">Nama Teknisi</th>
                        <th class="px-8 py-5 w-[15%]">Shiff</th>
                        <th class="px-8 py-5 w-[20%]">Posisi</th>
                        <th class="px-8 py-5 w-[25%] text-center">Job Specialization</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-white/[0.04] transition-all">
                            <td class="px-8 py-5">
                                <span class="text-green-500 font-mono text-xs font-bold" x-text="item.id || item.Id"></span>
                            </td>
                            <td class="px-8 py-5">
                                <div class="font-bold text-slate-100 text-sm" x-text="item.nama || item.Nama"></div>
                            </td>
                            <td class="px-8 py-5">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest" x-text="item.shiff || item.Shiff || '-'"></span>
                            </td>
                            <td class="px-8 py-5">
                                <span class="text-xs text-blue-400 font-medium" x-text="item.posisi || item.Posisi"></span>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <span class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest border"
                                      :class="{
                                          'bg-green-500/10 text-green-400 border-green-500/30': (item.job || item.Job) === 'Interface',
                                          'bg-orange-500/10 text-orange-400 border-orange-500/30': (item.job || item.Job) === 'Mesin',
                                          'bg-slate-800 text-slate-400 border-white/5': (item.job || item.Job) !== 'Interface' && (item.job || item.Job) !== 'Mesin'
                                      }"
                                      x-text="item.job || item.Job">
                                </span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="px-6 py-4 border-t border-white/5 bg-slate-900/40 flex justify-between items-center">
            <div class="text-[10px] font-mono text-slate-500 uppercase font-black">
                Page <span class="text-white" x-text="currentPage"></span> / <span x-text="totalPages"></span>
            </div>

            <div class="flex items-center gap-2">
                <button @click="currentPage--" :disabled="currentPage === 1" class="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-lg border border-slate-700 disabled:opacity-20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button @click="currentPage++" :disabled="currentPage === totalPages" class="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-lg border border-slate-700 disabled:opacity-20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, staffs: [], currentPage: 1, rowsPerPage: 10,

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { 
                return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; 
            },

            async getStaff() {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: 'fetch', table: 'staff', params: [24] })
                    });
                    const res = await response.json();
                    if (res && res.data) {
                        this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                    }
                } catch (err) {
                    console.error('Error:', err);
                } finally { this.loading = false; }
            }
        }
    }
</script>

</body>
</html>
