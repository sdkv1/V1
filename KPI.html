<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Systems v1 - Multi Shiff KPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 194, 0.3); }
        .input-dark {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glow-mesin { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .glow-interface { box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="p-4 lg:p-8">

<div class="max-w-[1400px] mx-auto w-full" x-data="staffManager()" x-init="getStaff()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div>
            <h2 class="text-2xl font-black neon-text uppercase tracking-tighter italic">Staff Systems <span class="text-white">v1</span></h2>
            <p class="text-[10px] text-slate-500 font-mono mt-1">> DATABASE_ACTIVE | <span x-text="staffs.length"></span> NODES CONNECTED</p>
        </div>
        
        <div class="flex gap-3">
            <button @click="getStaff()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-700 transition-all shadow-xl" :disabled="loading">
                <svg :class="loading ? 'animate-spin' : ''" class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            <button @click="openModal('add')" class="px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-black rounded-xl transition-all shadow-lg shadow-green-900/30 text-xs tracking-widest uppercase">
                + Add Staff
            </button>
        </div>
    </div>

    <div class="glass rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left table-fixed min-w-[900px]">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em] border-b border-white/5">
                        <th class="px-8 py-5 w-[100px]">Profile</th>
                        <th class="px-4 py-5 w-[25%]">Staff Identity</th>
                        <th class="px-8 py-5 w-[15%] text-center">Shiff</th>
                        <th class="px-8 py-5 w-[20%] text-center">Position</th>
                        <th class="px-8 py-5 w-[20%] text-center">Job Specialization</th>
                        <th class="px-8 py-5 w-[100px] text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="item in pagedStaffs" :key="item.id || item.Id">
                        <tr class="hover:bg-white/[0.04] transition-all group">
                            <td class="px-8 py-5">
                                <div class="w-11 h-11 rounded-2xl flex items-center justify-center border transition-all duration-300"
                                     :class="{
                                         'bg-green-500/10 border-green-500/40 glow-mesin': (item.job || item.Job) === 'Mesin',
                                         'bg-orange-500/10 border-orange-500/40 glow-interface': (item.job || item.Job) === 'Interface',
                                         'bg-slate-800 border-white/5': (item.job || item.Job) !== 'Mesin' && (item.job || item.Job) !== 'Interface'
                                     }">
                                    <svg class="w-5 h-5" 
                                         :class="{
                                             'text-green-400': (item.job || item.Job) === 'Mesin',
                                             'text-orange-400': (item.job || item.Job) === 'Interface',
                                             'text-slate-500': (item.job || item.Job) !== 'Mesin' && (item.job || item.Job) !== 'Interface'
                                         }"
                                         fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                                    </svg>
                                </div>
                            </td>
                            
                            <td class="px-4 py-5">
                                <div class="font-bold text-slate-100 text-sm" x-text="item.nama || item.Nama"></div>
                                <div class="text-[9px] text-slate-500 font-mono italic" x-text="'UID-' + (item.id || item.Id)"></div>
                            </td>
                            
                            <td class="px-8 py-5 text-center">
                                <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded border shadow-inner"
                                      :class="{
                                          'text-red-400 border-red-500/20 bg-red-500/5': (item.shiff || item.Shiff) === 'Libur',
                                          'text-slate-300 border-white/5 bg-slate-900/50': (item.shiff || item.Shiff) !== 'Libur'
                                      }"
                                      x-text="item.shiff || item.Shiff || 'Siang'"></span>
                            </td>
                            
                            <td class="px-8 py-5 text-center">
                                <span class="text-xs text-blue-400/80 font-bold uppercase tracking-tighter" x-text="item.posisi || item.Posisi"></span>
                            </td>
                            
                            <td class="px-8 py-5 text-center">
                                <span class="px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest border"
                                      :class="{
                                          'bg-green-500/10 text-green-400 border-green-500/20': (item.job || item.Job) === 'Mesin',
                                          'bg-orange-500/10 text-orange-400 border-orange-500/20': (item.job || item.Job) === 'Interface',
                                          'bg-slate-800 text-slate-500 border-white/5': (item.job || item.Job) !== 'Interface' && (item.job || item.Job) !== 'Mesin'
                                      }"
                                      x-text="item.job || item.Job">
                                </span>
                            </td>

                            <td class="px-8 py-5 text-right relative" x-data="{ menuOpen: false }">
                                <button @click="menuOpen = !menuOpen" @click.away="menuOpen = false" class="p-2 hover:bg-slate-700/50 rounded-lg">
                                    <svg class="w-5 h-5 text-slate-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                                </button>
                                <div x-show="menuOpen" x-cloak class="absolute right-12 top-12 w-28 glass border border-white/20 rounded-xl shadow-2xl z-50 overflow-hidden">
                                    <button @click="openModal('edit', item); menuOpen = false" class="w-full text-left px-4 py-2.5 text-[10px] font-black text-blue-400 hover:bg-blue-500/10 border-b border-white/5 uppercase">Edit</button>
                                    <button @click="deleteStaff(item.id || item.Id); menuOpen = false" class="w-full text-left px-4 py-2.5 text-[10px] font-black text-red-400 hover:bg-red-500/10 uppercase">Hapus</button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md" x-transition x-cloak>
        <div class="glass w-full max-w-md rounded-3xl shadow-2xl overflow-hidden shadow-black">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                <h3 class="text-sm font-black neon-text uppercase tracking-widest" x-text="mode === 'edit' ? 'Update Staff Node' : 'Register New Node'"></h3>
                <button @click="showModal = false" class="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-slate-400">&times;</button>
            </div>
            <form @submit.prevent="saveStaff" class="p-6 space-y-4">
                <div>
                    <label class="block text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">Full Name</label>
                    <input type="text" x-model="form.nama" required class="w-full input-dark rounded-xl px-4 py-2.5 text-sm font-bold outline-none focus:border-green-500/40">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">Shiff Plan</label>
                        <select x-model="form.shiff" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-bold uppercase cursor-pointer">
                            <option value="Libur">Libur</option>
                            <option value="Pagi">Pagi</option>
                            <option value="Middle">Middle</option>
                            <option value="Siang">Siang</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">Specialization</label>
                        <select x-model="form.job" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-bold uppercase cursor-pointer">
                            <option value="Mesin">Mesin</option>
                            <option value="Interface">Interface</option>
                            <option value="Software">Software</option>
                            <option value="Aksesoris">Aksesoris</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">Position</label>
                    <select x-model="form.posisi" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-bold uppercase">
                        <option value="Teknisi">Teknisi</option>
                        <option value="Admin">Admin</option>
                        <option value="Frontliner">Frontliner</option>
                        <option value="Kepala Cabang">KACAB</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">Outlet Name</label>
                    <input type="text" x-model="form.outlet" required class="w-full input-dark rounded-xl px-4 py-2.5 text-sm font-bold">
                </div>
                
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" @click="showModal = false" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cancel</button>
                    <button type="submit" class="bg-green-600 hover:bg-green-500 px-8 py-2.5 rounded-xl text-[10px] font-black text-white uppercase tracking-widest shadow-lg shadow-green-900/40" :disabled="loading">
                        <span x-text="loading ? 'Syncing...' : 'Sync Record'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function staffManager() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, showModal: false, mode: 'add', staffs: [], currentPage: 1, rowsPerPage: 10,
            form: { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Siang' },

            get pagedStaffs() {
                const start = (this.currentPage - 1) * this.rowsPerPage;
                return this.staffs.slice(start, start + parseInt(this.rowsPerPage));
            },
            get totalPages() { 
                return Math.ceil(this.staffs.length / this.rowsPerPage) || 1; 
            },

            async call(payload) {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    alert('Network Error: ' + err.message); return null;
                } finally { this.loading = false; }
            },

            async getStaff() {
                const res = await this.call({ method: 'fetch', table: 'staff', params: [24] });
                if (res && res.data) {
                    this.staffs = Array.isArray(res.data) ? res.data : [res.data];
                }
            },

            openModal(mode, item = null) {
                this.mode = mode; 
                this.showModal = true;
                if (mode === 'edit' && item) {
                    this.form = {
                        Id: item.id || item.Id, 
                        nama: item.nama || item.Nama,
                        outlet: item.outlet || item.Outlet, 
                        posisi: item.posisi || item.Posisi,
                        status: item.status || item.Status, 
                        job: item.job || item.Job,
                        shiff: item.shiff || item.Shiff || 'Siang'
                    };
                } else {
                    this.form = { Id: '', nama: '', outlet: 'S01 TIMORITEL MADIUN', posisi: 'Teknisi', status: 'Aktif', job: 'Mesin', shiff: 'Siang' };
                }
            },

            async saveStaff() {
                const res = await this.call({
                    method: 'path', table: 'staff',
                    params: [{ ...this.form, id: this.form.Id || 0 }]
                });
                if (res) { await this.getStaff(); this.showModal = false; }
            },

            async deleteStaff(id) {
                if (!confirm('Erase this record?')) return;
                const res = await this.call({ method: 'delete', table: 'staff', params: [id] });
                if (res) await this.getStaff();
            }
        }
    }
</script>

</body>
</html>
