<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griya Pinarak - Compact Live Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        }
        .glass { 
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">

<div class="max-w-[1100px] mx-auto w-full" x-data="transMonitor()" x-init="init()">
    
    <div class="flex justify-between items-center mb-4 bg-slate-900/50 p-3 rounded-xl border border-white/5 shadow-2xl">
        <div class="flex items-center gap-4">
            <div>
                <h1 class="text-sm font-black tracking-tighter uppercase italic">GRIYA <span class="neon-blue">PINARAK</span></h1>
                <p class="text-[8px] text-slate-500 font-mono uppercase tracking-widest">Live Node_24</p>
            </div>
            <div class="h-8 w-[1px] bg-white/10 hidden sm:block"></div>
            <div class="hidden sm:block">
                <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest mb-0.5">System Time</p>
                <p class="text-xs font-mono text-blue-400 font-bold tracking-wider" x-text="liveTime"></p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button @click="getTrans()" class="p-2 bg-blue-600/10 hover:bg-blue-600/20 rounded-lg border border-blue-500/30 transition-all" :disabled="loading">
                <svg :class="loading ? 'animate-spin' : ''" class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </div>

    <div class="glass rounded-xl shadow-xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-500 text-[8px] uppercase font-black tracking-widest border-b border-white/5">
                        <th class="px-4 py-2 w-20 text-center">Antrian</th>
                        <th class="px-4 py-2">Invoice & UUID</th>
                        <th class="px-4 py-2">Timestamp</th>
                        <th class="px-4 py-2 text-right">Node</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="trans in transactions" :key="trans.id">
                        <tr class="hover:bg-blue-500/[0.05] transition-all group">
                            <td class="px-4 py-2">
                                <div class="flex items-center justify-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_5px_#3b82f6]"></div>
                                    <span class="text-[10px] font-mono font-bold text-blue-400 tracking-tighter" x-text="trans.nomor_antrian"></span>
                                </div>
                            </td>
                            <td class="px-4 py-2">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-100 text-[11px] font-mono tracking-tight" x-text="trans.invoice_service"></span>
                                    <span class="text-[7px] text-slate-600 font-mono" x-text="'ID:' + trans.id"></span>
                                </div>
                            </td>
                            <td class="px-4 py-2 text-slate-400 text-[10px] font-mono" x-text="trans.tanggal_antrian"></td>
                            <td class="px-4 py-2 text-right">
                                <span class="text-[8px] text-slate-500 font-black uppercase" x-text="'NODE_' + trans.id_cabang_erzap"></span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3 px-2">
        <div class="w-full bg-slate-800 h-[2px] rounded-full overflow-hidden">
            <div class="bg-blue-500 h-full transition-all duration-[30000ms] linear" :style="'width: ' + progress + '%'"></div>
        </div>
    </div>
</div>

<script>
    function transMonitor() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false, transactions: [], lastSync: '--:--', liveTime: '00:00:00', progress: 0,
            init() {
                this.startClock();
                this.getTrans();
                setInterval(() => { this.getTrans(); this.progress = 0; }, 30000);
                setInterval(() => { if(this.progress < 100) this.progress += 3.33; }, 1000);
            },
            startClock() {
                setInterval(() => { this.liveTime = new Date().toLocaleTimeString('en-GB'); }, 1000);
            },
            async getTrans() {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: 'fetch', table: 'trans', params: [24] })
                    });
                    const res = await response.json();
                    if (res && res.data) {
                        this.transactions = Array.isArray(res.data) ? res.data : [res.data];
                    }
                } catch (err) { console.error(err); } finally { this.loading = false; }
            }
        }
    }
</script>
</body>
</html>
