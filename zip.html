<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griya Pinarak - Compact Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        }
        .glass { 
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 8px rgba(59, 130, 246, 0.4); }
        .font-mono { font-family: 'Fira Code', monospace; font-size: 11px; }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">

<div class="max-w-[1100px] mx-auto w-full" x-data="transMonitor()" x-init="init()">
    
    <div class="flex justify-between items-center mb-6 gap-4 bg-slate-900/50 p-4 rounded-2xl border border-white/5">
        <div>
            <h1 class="text-lg font-black tracking-tighter uppercase italic">GRIYA <span class="neon-blue">PINARAK</span></h1>
            <p class="text-[9px] text-slate-500 font-mono tracking-widest uppercase">NODE_24 // SYNC: <span x-text="lastSync" class="text-blue-400"></span></p>
        </div>
        
        <button @click="getTrans()" class="p-2.5 bg-blue-600/10 hover:bg-blue-600/20 rounded-xl border border-blue-500/30 transition-all shadow-lg" :disabled="loading">
            <svg :class="loading ? 'animate-spin' : ''" class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
        </button>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="glass p-3 rounded-xl border-l-2 border-l-blue-500">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Total</p>
            <h3 class="text-lg font-black" x-text="transactions.length"></h3>
        </div>
        <div class="glass p-3 rounded-xl border-l-2 border-l-emerald-500">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Branch</p>
            <h3 class="text-xs font-bold mt-1 truncate">Madiun</h3>
        </div>
        <div class="glass p-3 rounded-xl border-l-2 border-l-amber-500">
            <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Status</p>
            <h3 class="text-[10px] font-bold text-emerald-400 uppercase mt-1">Live</h3>
        </div>
    </div>

    <div class="glass rounded-2xl shadow-xl border border-white/10 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/80 text-slate-500 text-[9px] uppercase font-black tracking-widest border-b border-white/5">
                        <th class="px-5 py-3 w-16">Q</th>
                        <th class="px-5 py-3">Invoice & ID</th>
                        <th class="px-5 py-3">Timestamp</th>
                        <th class="px-5 py-3 text-right">Node</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <template x-for="trans in transactions" :key="trans.id">
                        <tr class="hover:bg-white/[0.03] transition-all group">
                            <td class="px-5 py-2.5">
                                <div class="bg-slate-800 px-2 py-1 rounded text-center border border-white/5 group-hover:border-blue-500/50 transition-all">
                                    <span class="text-blue-400 font-bold text-xs" x-text="trans.nomor_antrian"></span>
                                </div>
                            </td>
                            <td class="px-5 py-2.5">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-100 text-xs font-mono" x-text="trans.invoice_service"></span>
                                    <span class="text-[8px] text-slate-600 font-mono" x-text="'ID:' + trans.id"></span>
                                </div>
                            </td>
                            <td class="px-5 py-2.5 text-slate-400 text-[10px]" x-text="trans.tanggal_antrian"></td>
                            <td class="px-5 py-2.5 text-right">
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-slate-300 font-bold" x-text="trans.nama_cabang"></span>
                                    <span class="text-[8px] text-slate-600 font-black uppercase" x-text="'N_' + trans.id_cabang_erzap"></span>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 flex justify-between items-center px-2 opacity-50">
        <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest">© 2026 GP-CORE</p>
        <span class="text-[8px] text-slate-500 font-mono uppercase">System_Active: True</span>
    </div>
</div>

<script>
    function transMonitor() {
        return {
            url: 'https://job.hitungnota.com/api',
            loading: false,
            transactions: [],
            lastSync: '--:--',
            init() { this.getTrans(); setInterval(() => this.getTrans(), 60000); },
            async getTrans() {
                this.loading = true;
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: 'fetch', table: 'transaksi', params: [24] })
                    });
                    const res = await response.json();
                    if (res && res.data) {
                        this.transactions = Array.isArray(res.data) ? res.data : [res.data];
                        const now = new Date();
                        this.lastSync = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                    }
                } catch (err) { console.error(err); } finally { this.loading = false; }
            }
        }
    }
</script>

</body>
</html>
