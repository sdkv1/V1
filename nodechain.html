<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE CHAIN - Orange White Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #ffffff; 
            color: #1e293b; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #fff7ed 0%, #ffffff 80%);
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(249, 115, 22, 0.1);
        }
        .neon-text-orange { color: #f97316; text-shadow: 0 0 12px rgba(249, 115, 22, 0.2); }
        .font-mono { font-family: 'Fira Code', monospace; }
        .bg-grid { background-size: 30px 30px; background-image: linear-gradient(to right, rgba(249, 115, 22, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(249, 115, 22, 0.03) 1px, transparent 1px); }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen bg-grid">

<div class="max-w-[1000px] mx-auto w-full" x-data="nodeChain()" x-init="init()">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 p-5 rounded-2xl shadow-lg glass border border-orange-100">
        <div class="text-center md:text-left">
            <h1 class="text-xl font-black tracking-[0.2em] uppercase italic neon-text-orange">NODE <span class="text-slate-800">CHAIN</span></h1>
            <div class="flex items-center gap-2 mt-1 justify-center md:justify-start">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                </span>
                <p class="text-[9px] text-orange-600 font-mono uppercase tracking-[0.2em]">System_Online // White_Orange_Sync</p>
            </div>
        </div>

<div class="bg-slate-50 px-5 py-2.5 rounded-2xl border border-orange-100 shadow-sm flex flex-col items-center justify-center min-w-[160px]">
    <p class="text-[7px] text-orange-400 font-black uppercase tracking-[0.3em] mb-1">Live_Sync</p>
    
    <p class="text-[9px] font-mono font-bold text-slate-400 uppercase tracking-[0.1em]" x-text="liveDate">05 APR 2026</p>
    
    <div class="flex items-baseline gap-0.5">
        <h2 class="text-xl font-mono font-black tracking-tight text-slate-800" x-text="liveTime">00:00</h2>
        <span class="text-xs font-mono font-bold text-orange-500 w-[20px]" x-text="liveSeconds">:00</span>
    </div>
</div>


        
        <div class="hidden lg:block text-right">
            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest">Page_Status</p>
            <p class="text-[10px] font-mono text-orange-600 font-bold uppercase tracking-tighter" x-text="`Page ${page} / ${totalPages}`"></p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-orange-50 overflow-hidden relative">
        <div class="absolute top-0 left-0 h-[2px] bg-orange-500 transition-all duration-1000 ease-linear" :style="'width: ' + pulseWidth + '%'"></div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-orange-50/50 text-orange-900/40 text-[8px] uppercase font-black tracking-widest border-b border-orange-100">
                        <th class="px-6 py-4 w-1/3">Reference (Antrian/ID)</th>
                        <th class="px-6 py-4">Transaction (Invoice/Tanggal)</th>
                        <th class="px-6 py-4 text-right">Origin</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-orange-50">
                    <template x-for="trans in pagedTransactions()" :key="trans.id">
                        <tr class="hover:bg-orange-50/30 transition-all group border-l-2 border-l-transparent hover:border-l-orange-500">
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-1">
                                    <div class="flex items-center gap-2">
                                        <div class="w-1.5 h-1.5 rounded-full bg-orange-500"></div>
                                        <span class="text-[11px] font-mono font-black text-orange-600 tracking-[0.1em]" x-text="trans.nomor_antrian"></span>
                                    </div>
                                    <span class="text-[8px] text-slate-400 font-mono uppercase tracking-widest ml-3.5" x-text="'SYS_ID: ' + trans.id"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col gap-0.5">
                                    <span class="font-bold text-slate-800 text-[12px] font-mono tracking-tight" x-text="trans.invoice_service"></span>
                                    <span class="text-slate-400 font-mono text-[9px]" x-text="trans.tanggal_antrian"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="inline-block bg-orange-100 px-2.5 py-1 rounded border border-orange-200">
                                    <span class="text-[9px] text-orange-700 font-black uppercase tracking-tighter" x-text="'NODE_' + trans.id_cabang_erzap"></span>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="p-4 bg-orange-50/30 border-t border-orange-100 flex justify-between items-center">
            <span class="text-[9px] font-mono text-orange-900/40 uppercase tracking-widest" x-text="`Total_Pool: ${transactions.length}`"></span>
            <div class="flex gap-2">
                <button @click="prevPage()" :disabled="page === 1" class="px-4 py-1.5 bg-white hover:border-orange-300 shadow-sm disabled:opacity-40 rounded-lg border border-orange-200 text-[9px] font-black text-orange-700 uppercase tracking-widest transition-all">Prev</button>
                <button @click="nextPage()" :disabled="page >= totalPages" class="px-4 py-1.5 bg-white hover:border-orange-300 shadow-sm disabled:opacity-40 rounded-lg border border-orange-200 text-[9px] font-black text-orange-700 uppercase tracking-widest transition-all">Next</button>
            </div>
        </div>
    </div>

    <div class="mt-4 flex justify-between items-center px-2 opacity-60 font-mono text-[8px] text-slate-400">
        <p class="uppercase tracking-[0.5em]">NodeChain_v1.2.5_OrW</p>
        <div class="flex gap-4">
            <span>SYNC: 1HZ</span>
            <span x-text="`LIMIT: ${perPage}_PER_PAGE` "></span>
        </div>
    </div>
</div>

<script>
    function nodeChain() {
        return {
            url: 'https://job.hitungnota.com/api',
            transactions: [],
            liveTime: '00:00:00',
            pulseWidth: 0,
            
            page: 1,
            perPage: 10, 
            totalPages: 1,

            init() {
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                
                this.getTrans();
                setInterval(() => {
                    this.getTrans();
                    this.pulseWidth = 0;
                    setTimeout(() => this.pulseWidth = 100, 50);
                }, 1000);
            },

            pagedTransactions() {
                const start = (this.page - 1) * this.perPage;
                return this.transactions.slice(start, start + this.perPage);
            },

            nextPage() { if(this.page < this.totalPages) this.page++; },
            prevPage() { if(this.page > 1) this.page--; },

            updateClock() {
    const now = new Date();
    
    // Format Jam:Menit (HH:mm)
    this.liveTime = now.toLocaleTimeString('en-GB', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit' 
    });

    // Detik (:ss)
    const sec = now.getSeconds().toString().padStart(2, '0');
    this.liveSeconds = `:${sec}`;

    // Tanggal (Contoh: 05 APR 2026)
    this.liveDate = now.toLocaleDateString('id-ID', { 
        day: '2-digit', 
        month: 'short', 
        year: 'numeric' 
    }).toUpperCase();
},


            async getTrans() {
                try {
                    const response = await fetch(this.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: 'fetch', table: 'trans', params: [24] })
                    });
                    const res = await response.json();
                    if (res && res.data) {
                        let rawData = Array.isArray(res.data) ? res.data : [res.data];
                        this.transactions = rawData.sort((a, b) => b.id - a.id);
                        this.totalPages = Math.max(1, Math.ceil(this.transactions.length / this.perPage));
                    }
                } catch (err) { console.error('Sync error'); }
            }
        }
    }
</script>

</body>
</html>
